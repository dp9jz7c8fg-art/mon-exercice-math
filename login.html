<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #040804 0%, #061008 25%, #081a0e 50%, #0a2414 75%, #040804 100%);
            background-size: 400% 400%;
            animation: gradShift 20s ease infinite;
            color: #f0f0f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Symboles flottants */
        .math-symbols { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .math-sym {
            position: absolute; font-size: 28px; opacity: 0;
            color: rgba(46,204,113,0.06);
            animation: floatSym linear infinite;
            font-family: 'JetBrains Mono', monospace;
            user-select: none;
        }
        @keyframes floatSym {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.1; }
            90%  { opacity: 0.06; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .login-box {
            position: relative;
            z-index: 1;
            background: rgba(10,30,16,0.7);
            border: 1px solid rgba(40,100,55,0.3);
            border-radius: 24px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(16px);
            box-shadow: 0 16px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .logo-small img {
            max-height: 60px;
            width: auto;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #2ecc71, #a8f0c0, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Onglets connexion/inscription */
        .auth-tabs {
            display: flex;
            gap: 0;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border: none;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.4);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: rgba(46,204,113,0.1);
            color: #f0f0f8;
        }

        .auth-tab:hover { color: #f0f0f8; }

        /* Formulaire */
        .form-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .form-group input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: #f0f0f8;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .form-group input:focus { border-color: rgba(46,204,113,0.5); }

        #register-fields {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 16px;
        }

        #login-fields {
            display: flex;
            width: 100%;
            flex-direction: column;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #1a1a2e;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.98); }

        #error-msg {
            font-size: 13px;
            color: #ff6b6b;
            text-align: center;
            min-height: 18px;
        }

        #success-msg {
            font-size: 13px;
            color: #6bffa0;
            text-align: center;
            min-height: 18px;
        }

        .separator {
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            position: relative;
        }

        .separator::before, .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(46,204,113,0.1);
        }
        .separator::before { left: 0; }
        .separator::after { right: 0; }

        /* Avatar selection */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.04);
        }

        .avatar-option:hover { border-color: rgba(255,255,255,0.3); transform: scale(1.1); }

        .avatar-option.selected {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.15);
            transform: scale(1.1);
            box-shadow: 0 0 16px rgba(46,204,113,0.2);
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-box { padding: 28px 20px; }
            .login-title { font-size: 20px; }
            .avatar-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .avatar-option { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="math-symbols" id="math-bg"></div>

<div class="login-box">

    <div class="logo-small"><img src="logo.png" alt="Logo"></div>

    <h1 class="login-title">La Classe de Stef</h1>

    <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
        <button class="auth-tab" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- CONNEXION -->
    <div id="login-fields">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="ton.email@exemple.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-submit" onclick="doLogin()">Se connecter</button>
    </div>

    <!-- INSCRIPTION -->
    <div id="register-fields">
        <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="reg-name" placeholder="Ton prénom" autocomplete="given-name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="ton.email@exemple.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Mot de passe (6 caractères minimum)</label>
            <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="separator">Choisis ton avatar</div>
        <div class="avatar-grid" id="avatar-grid"></div>
        <button class="btn-submit" onclick="doRegister()">S'inscrire</button>
    </div>

    <div id="error-msg"></div>
    <div id="success-msg"></div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Chargement…</span>
    </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Config ──
const firebaseConfig = {
    apiKey: "AIzaSyB0djV_ZDOsYngnUeceNiTUt60IEKP_Qvg",
    authDomain: "classe-de-stef.firebaseapp.com",
    projectId: "classe-de-stef",
    storageBucket: "classe-de-stef.firebasestorage.app",
    messagingSenderId: "16372668790",
    appId: "1:16372668790:web:b1bfed825bfb36111b0257"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let isRegistering = false; // Bloque la redirection pendant l'inscription

// ── Si déjà connecté → accueil ──
auth.onAuthStateChanged(user => {
    if (user && !isRegistering) window.location.href = 'index.html';
});

// ── Avatars ──
const AVATARS = ['🦊','🐱','🐶','🐼','🦁','🐸','🦉','🐙','🦋','🐢','🐬','🦄','🐧','🐰','🐝'];
let selectedAvatar = AVATARS[0];

const grid = document.getElementById('avatar-grid');
AVATARS.forEach((av, i) => {
    const btn = document.createElement('div');
    btn.className = 'avatar-option' + (i === 0 ? ' selected' : '');
    btn.textContent = av;
    btn.onclick = () => {
        document.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedAvatar = av;
    };
    grid.appendChild(btn);
});

// ── Onglets ──
function showTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('error-msg').textContent = '';
    document.getElementById('success-msg').textContent = '';

    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-fields').style.display = 'flex';
        document.getElementById('register-fields').style.display = 'none';
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('login-fields').style.display = 'none';
        document.getElementById('register-fields').style.display = 'flex';
    }
}

// ── Connexion ──
async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'Remplis tous les champs.'; return; }

    showLoading(true);
    try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged redirigera
    } catch (e) {
        showLoading(false);
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
            errEl.textContent = 'Email ou mot de passe incorrect.';
        else if (e.code === 'auth/invalid-email')
            errEl.textContent = 'Adresse email invalide.';
        else if (e.code === 'auth/too-many-requests')
            errEl.textContent = 'Trop de tentatives. Réessaie plus tard.';
        else
            errEl.textContent = 'Erreur : ' + e.message;
    }
}

// ── Inscription ──
async function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-password').value;
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');
    errEl.textContent = '';
    sucEl.textContent = '';

    if (!name || !email || !pass) { errEl.textContent = 'Remplis tous les champs.'; return; }
    if (pass.length < 6) { errEl.textContent = 'Le mot de passe doit avoir au moins 6 caractères.'; return; }

    showLoading(true);
    isRegistering = true; // Empêche la redirection automatique
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const user = cred.user;

        // Sauver le profil dans Firestore
        await db.collection('users').doc(user.uid).set({
            name: name,
            email: email,
            avatar: selectedAvatar,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            scores: {
                angles: { done: 0, correct: 0 },
                fractions: {
                    comparer: { done: 0, correct: 0 },
                    convertir: { done: 0, correct: 0 },
                    arrondir: { done: 0, correct: 0 },
                    simplifier: { done: 0, correct: 0 },
                    'add-sub': { done: 0, correct: 0 },
                    multiplier: { done: 0, correct: 0 },
                    diviser: { done: 0, correct: 0 },
                },
                algebre: {
                    comprendre: { done: 0, correct: 0 },
                    evaluer: { done: 0, correct: 0 },
                    simplifier: { done: 0, correct: 0 },
                    parentheses: { done: 0, correct: 0 },
                    developper: { done: 0, correct: 0 },
                    factoriser: { done: 0, correct: 0 },
                    identites: { done: 0, correct: 0 },
                    polynomes: { done: 0, correct: 0 },
                    problemes: { done: 0, correct: 0 },
                }
            },
            badges: [],
            totalExercises: 0,
            totalCorrect: 0,
        });

        // Mettre le nom dans le profil Auth
        await user.updateProfile({ displayName: name });

        // Tout est sauvé, on peut rediriger maintenant
        isRegistering = false;
        window.location.href = 'index.html';
    } catch (e) {
        showLoading(false);
        if (e.code === 'auth/email-already-in-use')
            errEl.textContent = 'Cet email est déjà utilisé.';
        else if (e.code === 'auth/invalid-email')
            errEl.textContent = 'Adresse email invalide.';
        else if (e.code === 'auth/weak-password')
            errEl.textContent = 'Mot de passe trop faible (6 caractères minimum).';
        else
            errEl.textContent = 'Erreur : ' + e.message;
    }
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
    document.querySelectorAll('.btn-submit').forEach(b => b.style.display = show ? 'none' : 'block');
}

// Entrée = valider
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

// ── Symboles flottants ──
const symbols = ['∑','π','√','∞','∠','△','∫','÷','×','±','≈','≠','½','¾','⅓'];
const mathBg = document.getElementById('math-bg');
function createSym() {
    const el = document.createElement('span');
    el.className = 'math-sym';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (18 + Math.random() * 28) + 'px';
    el.style.animationDuration = (15 + Math.random() * 25) + 's';
    el.style.animationDelay = Math.random() * 3 + 's';
    mathBg.appendChild(el);
    setTimeout(() => el.remove(), 45000);
}
for (let i = 0; i < 12; i++) setTimeout(createSym, i * 600);
setInterval(createSym, 2500);
</script>

</body>
</html>
