<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #040804 0%, #061008 25%, #081a0e 50%, #0a2414 75%, #040804 100%);
            background-size: 400% 400%;
            animation: gradShift 20s ease infinite;
            color: #f0f0f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Symboles flottants */
        .math-symbols { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .math-sym {
            position: absolute; font-size: 28px; opacity: 0;
            color: rgba(46,204,113,0.06);
            animation: floatSym linear infinite;
            font-family: 'JetBrains Mono', monospace;
            user-select: none;
        }
        @keyframes floatSym {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.1; }
            90%  { opacity: 0.06; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .login-box {
            position: relative;
            z-index: 1;
            background: rgba(10,30,16,0.7);
            border: 1px solid rgba(40,100,55,0.3);
            border-radius: 24px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(16px);
            box-shadow: 0 16px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .logo-small img {
            max-height: 60px;
            width: auto;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #2ecc71, #a8f0c0, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Onglets connexion/inscription */
        .auth-tabs {
            display: flex;
            gap: 0;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border: none;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.4);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: rgba(46,204,113,0.1);
            color: #f0f0f8;
        }

        .auth-tab:hover { color: #f0f0f8; }

        /* Formulaire */
        .form-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            margin-bottom: 2px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .form-group input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 16px 18px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: #f0f0f8;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .form-group input:focus { border-color: rgba(46,204,113,0.5); }

        .form-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #f0f0f8;
            outline: none;
            width: 100%;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232ecc71'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }
        .form-select:focus { border-color: rgba(46,204,113,0.5); }
        .form-select option { background: #1a1a2e; color: #f0f0f8; }

        .chip-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .chip:hover { border-color: rgba(46,204,113,0.3); color: rgba(255,255,255,0.7); }

        .chip.selected {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            font-weight: 600;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            background: none;
            color: rgba(255,255,255,0.4);
            transition: all 0.15s;
        }

        .btn-back:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }

        .btn-forgot {
            width: 100%;
            background: none;
            border: none;
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            color: rgba(46,204,113,0.5);
            cursor: pointer;
            padding: 8px;
            transition: color 0.15s;
        }
        .btn-forgot:hover { color: #2ecc71; }



        .theme-modal { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center }
        .theme-modal.open { display:flex }
        .theme-box { background:#081a0e;border:1px solid rgba(40,100,55,0.3);border-radius:20px;padding:28px;width:90%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:16px }
        .theme-title { font-size:16px;font-weight:700 }
        .theme-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100% }
        .theme-opt { aspect-ratio:1;border-radius:16px;cursor:pointer;border:3px solid transparent;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px }
        .theme-opt:hover { transform:scale(1.05) }
        .theme-opt.selected { border-color:#fff !important;box-shadow:0 0 20px rgba(255,255,255,0.15) }
        .theme-opt-name { font-size:10px;font-weight:600;color:rgba(255,255,255,0.6) }
        .theme-close { background:#2ecc71;color:#040804;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer }

        .form-input-small {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            color: #f0f0f8;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .form-input-small::placeholder { color: rgba(255,255,255,0.2); }
        .form-input-small:focus { border-color: rgba(46,204,113,0.5); }

        #register-fields {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 16px;
        }

        #login-fields {
            display: flex;
            width: 100%;
            flex-direction: column;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #1a1a2e;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.98); }

        #error-msg {
            font-size: 13px;
            color: #ff6b6b;
            text-align: center;
            min-height: 18px;
        }

        #success-msg {
            font-size: 13px;
            color: #6bffa0;
            text-align: center;
            min-height: 18px;
        }

        .separator {
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            position: relative;
        }

        .separator::before, .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(46,204,113,0.1);
        }
        .separator::before { left: 0; }
        .separator::after { right: 0; }

        /* Avatar selection */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.04);
        }

        .avatar-option:hover { border-color: rgba(255,255,255,0.3); transform: scale(1.1); }

        .avatar-option.selected {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.15);
            transform: scale(1.1);
            box-shadow: 0 0 16px rgba(46,204,113,0.2);
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-box { padding: 28px 20px; }
            .login-title { font-size: 20px; }
            .avatar-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .avatar-option { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="math-symbols" id="math-bg"></div>

<div class="login-box">

    <div class="logo-small"><img src="logo.png" alt="Logo"></div>

    <h1 class="login-title">La Classe de Stef</h1>

    <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
        <button class="auth-tab" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- CONNEXION -->
    <div id="login-fields">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="ton.email@exemple.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-submit" onclick="doLogin()">Se connecter</button>
        <button class="btn-forgot" onclick="resetPassword()">Mot de passe oublié ?</button>
    </div>

    <!-- INSCRIPTION -->
    <div id="register-fields" style="gap:24px;">
        <!-- Étape 1 : infos de base -->
        <div id="reg-step1">
            <div style="display:flex;gap:10px;width:100%;">
                <div class="form-group" style="flex:1;">
                    <label>Nom</label>
                    <input type="text" id="reg-lastname" placeholder="Nom" autocomplete="family-name">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Prénom</label>
                    <input type="text" id="reg-name" placeholder="Prénom" autocomplete="given-name">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="ton.email@exemple.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Mot de passe (6 caractères minimum)</label>
                <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Numéro de téléphone (optionnel)</label>
                <input type="tel" id="reg-phone" placeholder="+32 XXX XX XX XX" autocomplete="tel">
            </div>
            <div class="separator">Choisis ton avatar</div>
            <div class="avatar-grid" id="avatar-grid"></div>
            <button class="btn-submit" onclick="goToStep2()">Continuer →</button>
            <div class="separator">🎨 Apparence du site</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;">
                <div class="theme-opt selected" onclick="selectTheme('green')" style="background:linear-gradient(135deg,#040804,#081a0e);aspect-ratio:1;border-radius:14px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" data-theme="green">
                    <div style="width:18px;height:18px;border-radius:50%;background:#2ecc71;"></div>
                    <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.5);">Forêt</span>
                </div>
                <div class="theme-opt" onclick="selectTheme('blue')" style="background:linear-gradient(135deg,#040810,#081428);aspect-ratio:1;border-radius:14px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" data-theme="blue">
                    <div style="width:18px;height:18px;border-radius:50%;background:#3498db;"></div>
                    <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.5);">Océan</span>
                </div>
                <div class="theme-opt" onclick="selectTheme('purple')" style="background:linear-gradient(135deg,#0a0418,#1a0a30);aspect-ratio:1;border-radius:14px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" data-theme="purple">
                    <div style="width:18px;height:18px;border-radius:50%;background:#9b59b6;"></div>
                    <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.5);">Cosmos</span>
                </div>
                <div class="theme-opt" onclick="selectTheme('red')" style="background:linear-gradient(135deg,#0a0404,#1a0808);aspect-ratio:1;border-radius:14px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" data-theme="red">
                    <div style="width:18px;height:18px;border-radius:50%;background:#e74c3c;"></div>
                    <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.5);">Lave</span>
                </div>
            </div>
        </div>

        <!-- Étape 2 : profil d'apprentissage -->
        <div id="reg-step2" style="display:none;width:100%;flex-direction:column;gap:16px;">
            <div class="separator">📚 Ton profil d'apprentissage</div>

            <div class="form-group">
                <label>Année scolaire</label>
                <select id="reg-annee" class="form-select">
                    <option value="">— Choisis ton année —</option>
                    <option value="1">1ère année</option>
                    <option value="2">2ème année</option>
                    <option value="3">3ème année</option>
                    <option value="4">4ème année</option>
                    <option value="5">5ème année</option>
                    <option value="6">6ème année</option>
                </select>
            </div>

            <div class="form-group">
                <label>Trouble(s) d'apprentissage (optionnel)</label>
                <div class="chip-grid" id="troubles"></div>
            </div>

            <div class="form-group">
                <label>Mes points forts</label>
                <div class="chip-grid" id="points-forts"></div>
                <input type="text" id="pf-cours" placeholder="Précise tes cours forts (optionnel)" style="margin-top:6px;" class="form-input-small">
            </div>

            <div class="form-group">
                <label>Points à soutenir / à travailler</label>
                <div class="chip-grid" id="points-faibles"></div>
                <input type="text" id="pf-cours-faibles" placeholder="Précise les cours à travailler (optionnel)" style="margin-top:6px;" class="form-input-small">
            </div>

            <div class="form-group">
                <label>Suivis extérieurs (optionnel)</label>
                <div class="chip-grid" id="suivis-ext"></div>
            </div>

            <div class="form-group">
                <label>Aides — ce qui fonctionne quand je travaille</label>
                <input type="text" id="reg-aides" placeholder="Ex: travailler avec de la musique, faire des pauses…">
            </div>

            <div class="form-group">
                <label>Quelque chose à ajouter ? (optionnel)</label>
                <input type="text" id="reg-notes" placeholder="Ex: j'ai un PIA, un aménagement…">
            </div>

            <button class="btn-submit" onclick="doRegister()">S'inscrire ✓</button>
            <button class="btn-back" onclick="backToStep1()">← Retour</button>
        </div>
    </div>

    <div id="error-msg"></div>
    <div id="success-msg"></div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Chargement…</span>
    </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Config ──
const firebaseConfig = {
    apiKey: "AIzaSyB0djV_ZDOsYngnUeceNiTUt60IEKP_Qvg",
    authDomain: "classe-de-stef.firebaseapp.com",
    projectId: "classe-de-stef",
    storageBucket: "classe-de-stef.firebasestorage.app",
    messagingSenderId: "16372668790",
    appId: "1:16372668790:web:b1bfed825bfb36111b0257"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let isRegistering = false; // Bloque la redirection pendant l'inscription

// ── Si déjà connecté → accueil ──
auth.onAuthStateChanged(user => {
    if (user && !isRegistering) window.location.href = 'eleve.html';
});

// ── Avatars ──
const AVATARS = ['🦊','🐱','🐶','🐼','🦁'];
let selectedAvatar = AVATARS[0];

const grid = document.getElementById('avatar-grid');

// 5 animaux
AVATARS.forEach((av, i) => {
    const btn = document.createElement('div');
    btn.className = 'avatar-option' + (i === 0 ? ' selected' : '');
    btn.textContent = av;
    btn.onclick = () => {
        document.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedAvatar = av;
    };
    grid.appendChild(btn);
});

// Initiales
const initialsBtn = document.createElement('div');
initialsBtn.className = 'avatar-option';
initialsBtn.id = 'initials-avatar';
initialsBtn.style.fontSize = '16px';
initialsBtn.style.fontWeight = '800';
initialsBtn.style.color = '#2ecc71';
initialsBtn.textContent = '??';
initialsBtn.title = 'Tes initiales';
initialsBtn.onclick = () => {
    const fn = document.getElementById('reg-name').value.trim();
    const ln = document.getElementById('reg-lastname').value.trim();
    const initials = ((fn[0]||'')+(ln[0]||'')).toUpperCase() || '??';
    initialsBtn.textContent = initials;
    document.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
    initialsBtn.classList.add('selected');
    selectedAvatar = '✏️' + initials;
};
grid.appendChild(initialsBtn);

// Créer avatar
const createBtn = document.createElement('div');
createBtn.className = 'avatar-option';
createBtn.style.fontSize = '18px';
createBtn.textContent = '🎨';
createBtn.title = 'Créer mon avatar';
createBtn.style.opacity = '0.5';
createBtn.onclick = () => {
    alert('Tu pourras créer ton avatar personnalisé après l\'inscription, dans "Mon profil" !');
};
grid.appendChild(createBtn);

// Auto-update initials when name changes
['reg-name','reg-lastname'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const fn = document.getElementById('reg-name').value.trim();
        const ln = document.getElementById('reg-lastname').value.trim();
        initialsBtn.textContent = ((fn[0]||'')+(ln[0]||'')).toUpperCase() || '??';
    });
});

// ── Onglets ──
function showTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('error-msg').textContent = '';
    document.getElementById('success-msg').textContent = '';

    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-fields').style.display = 'flex';
        document.getElementById('register-fields').style.display = 'none';
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('login-fields').style.display = 'none';
        document.getElementById('register-fields').style.display = 'flex';
    }
}

// ── Connexion ──
async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'Remplis tous les champs.'; return; }

    showLoading(true);
    try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged redirigera
    } catch (e) {
        showLoading(false);
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
            errEl.textContent = 'Email ou mot de passe incorrect.';
        else if (e.code === 'auth/invalid-email')
            errEl.textContent = 'Adresse email invalide.';
        else if (e.code === 'auth/too-many-requests')
            errEl.textContent = 'Trop de tentatives. Réessaie plus tard.';
        else
            errEl.textContent = 'Erreur : ' + e.message;
    }
}

// ── Chips ──
const TROUBLES = ['Dyslexie','Dyscalculie','Dysorthographie','TDA/H','HPI','Autre'];
const COMPETENCES = ['Organisation','Planification','Synthèse','Mémorisation','Consignes','Place de l\'erreur','Attention et concentration','Gestion des émotions','Cours'];
const SUIVIS = ['Logopède','Neuropsychologue','Coach scolaire','Psychologue','Aucun'];

let troublesSel = [];
let pointsForts = [];
let pointsFaibles = [];
let suivisExt = [];

function buildChips(containerId, items, selectedArray) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    items.forEach(item => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = item;
        chip.onclick = () => {
            const idx = selectedArray.indexOf(item);
            if (idx >= 0) { selectedArray.splice(idx, 1); chip.classList.remove('selected'); }
            else { selectedArray.push(item); chip.classList.add('selected'); }
        };
        container.appendChild(chip);
    });
}

buildChips('troubles', TROUBLES, troublesSel);
buildChips('points-forts', COMPETENCES, pointsForts);
buildChips('points-faibles', COMPETENCES, pointsFaibles);
buildChips('suivis-ext', SUIVIS, suivisExt);

// ── Step navigation ──
function goToStep2() {
    const lastname = document.getElementById('reg-lastname').value.trim();
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-password').value;
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!lastname || !name || !email || !pass) { errEl.textContent = 'Remplis tous les champs.'; return; }
    if (pass.length < 6) { errEl.textContent = 'Le mot de passe doit avoir au moins 6 caractères.'; return; }

    document.getElementById('reg-step1').style.display = 'none';
    document.getElementById('reg-step2').style.display = 'flex';
    errEl.textContent = '';
}

function backToStep1() {
    document.getElementById('reg-step2').style.display = 'none';
    document.getElementById('reg-step1').style.display = 'block';
}

// ── Inscription ──
async function doRegister() {
    const lastname = document.getElementById('reg-lastname').value.trim();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-password').value;
    const annee = document.getElementById('reg-annee').value;
    const notes = document.getElementById('reg-notes').value.trim();
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');
    errEl.textContent = '';
    sucEl.textContent = '';

    if (!annee) { errEl.textContent = 'Choisis ton année scolaire.'; return; }

    showLoading(true);
    isRegistering = true;
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const user = cred.user;

        await db.collection('users').doc(user.uid).set({
            name: name,
            lastname: lastname,
            email: email,
            phone: document.getElementById('reg-phone').value.trim(),
            avatar: selectedAvatar.startsWith('✏️') ? selectedAvatar.slice(2) : selectedAvatar,
            avatarType: selectedAvatar.startsWith('✏️') ? 'initials' : 'emoji',
            theme: selectedTheme,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            learningProfile: {
                annee: annee,
                troubles: troublesSel,
                pointsForts: pointsForts,
                pointsFortsCoursDetail: document.getElementById('pf-cours').value.trim(),
                pointsFaibles: pointsFaibles,
                pointsFaiblesCoursDetail: document.getElementById('pf-cours-faibles').value.trim(),
                suivisExt: suivisExt,
                aides: document.getElementById('reg-aides').value.trim(),
                notes: notes,
            },
            scores: {
                angles: { done: 0, correct: 0 },
                fractions: {
                    comparer: { done: 0, correct: 0 },
                    convertir: { done: 0, correct: 0 },
                    arrondir: { done: 0, correct: 0 },
                    simplifier: { done: 0, correct: 0 },
                    'add-sub': { done: 0, correct: 0 },
                    multiplier: { done: 0, correct: 0 },
                    diviser: { done: 0, correct: 0 },
                },
                algebre: {
                    comprendre: { done: 0, correct: 0 },
                    evaluer: { done: 0, correct: 0 },
                    simplifier: { done: 0, correct: 0 },
                    parentheses: { done: 0, correct: 0 },
                    developper: { done: 0, correct: 0 },
                    factoriser: { done: 0, correct: 0 },
                    identites: { done: 0, correct: 0 },
                    polynomes: { done: 0, correct: 0 },
                    problemes: { done: 0, correct: 0 },
                }
            },
            badges: [],
            totalExercises: 0,
            totalCorrect: 0,
        });

        await user.updateProfile({ displayName: name + ' ' + lastname });

        isRegistering = false;
        window.location.href = 'eleve.html';
    } catch (e) {
        showLoading(false);
        isRegistering = false;
        if (e.code === 'auth/email-already-in-use')
            errEl.textContent = 'Cet email est déjà utilisé.';
        else if (e.code === 'auth/invalid-email')
            errEl.textContent = 'Adresse email invalide.';
        else if (e.code === 'auth/weak-password')
            errEl.textContent = 'Mot de passe trop faible (6 caractères minimum).';
        else
            errEl.textContent = 'Erreur : ' + e.message;
    }
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
    document.querySelectorAll('.btn-submit').forEach(b => b.style.display = show ? 'none' : 'block');
}

// Entrée = valider
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

// ── Symboles flottants ──
const symbols = ['∑','π','√','∞','∠','△','∫','÷','×','±','≈','≠','½','¾','⅓'];
const mathBg = document.getElementById('math-bg');
function createSym() {
    const el = document.createElement('span');
    el.className = 'math-sym';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (18 + Math.random() * 28) + 'px';
    el.style.animationDuration = (15 + Math.random() * 25) + 's';
    el.style.animationDelay = Math.random() * 3 + 's';
    mathBg.appendChild(el);
    setTimeout(() => el.remove(), 45000);
}
for (let i = 0; i < 12; i++) setTimeout(createSym, i * 600);
setInterval(createSym, 2500);
</script>

            </div>

        <button class="theme-close" onclick="closeThemePicker()">Valider</button>
    </div>
</div>

<script>
let selectedTheme = 'green';

function openThemePicker() { document.getElementById('theme-modal').classList.add('open'); }
function closeThemePicker() { document.getElementById('theme-modal').classList.remove('open'); }

function selectTheme(theme) {
    selectedTheme = theme;
    document.querySelectorAll('.theme-opt').forEach(t => t.classList.toggle('selected', t.dataset.theme === theme));
    if (typeof applyTheme === 'function') applyTheme(theme);
}

async function resetPassword() {
    const email = document.getElementById('login-email').value.trim();
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');
    errEl.textContent = '';
    sucEl.textContent = '';

    if (!email) { errEl.textContent = 'Entre ton email pour réinitialiser.'; return; }

    try {
        await auth.sendPasswordResetEmail(email);
        sucEl.textContent = '📧 Email de réinitialisation envoyé ! Vérifie ta boîte mail.';
    } catch(e) {
        if (e.code === 'auth/user-not-found') errEl.textContent = 'Aucun compte avec cet email.';
        else errEl.textContent = 'Erreur : ' + e.message;
    }
}
</script>
