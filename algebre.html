        #reponse-zone { display: flex; flex-direction: column; gap: 12px; }

        .qcm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .qcm-btn {

        #feedback-steps {
            font-size: 13px; line-height: 1.8; color: var(--muted);

        }
        #feedback-steps strong { color: var(--text); }
        #btn-suivant {
            display: none; width: 100%; background: var(--surface); border: 1px solid var(--accent);
            border-radius: var(--radius); padding: 14px; font-size: 15px;

        }
    @keyframes themeGrad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

        /* в”Җв”Җ MOBILE RESPONSIVE в”Җв”Җ */

</style>

<body>

<div id="app-header">
    <a href="index.html" class="back-link">вҶҗ Accueil</a>
    <span id="app-title">рқ‘Ҙ ALGГҲBRE</span>
    <div id="score-display"><strong id="sc-bon">0</strong> / <span id="sc-total">0</span></div>
</div>

<div id="main">
    <div id="tabs-wrap"><div id="tabs"></div></div>
    <div id="exercice-box">
        <div id="consigne"></div>
        <div id="enonce" class="expr-display"></div>
        <div id="reponse-zone"></div>
        <button id="btn-valider" onclick="valider()">Valider</button>
    </div>
    <div id="feedback-box">
        <div id="feedback-result"></div>
        <div id="feedback-steps"></div>
    </div>
    <button id="btn-suivant" onclick="suivant()">Exercice suivant вҶ’</button>
</div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  OBJECTIFS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const OBJECTIFS = [
    { id: 'comprendre',   label: 'Comprendre',     icon: 'рҹ“–' },
    { id: 'evaluer',      label: 'Гүvaluer',        icon: 'рҹ”ў' },
    { id: 'simplifier',   label: 'Simplifier',     icon: 'вңӮпёҸ' },
    { id: 'parentheses',  label: 'ParenthГЁses',    icon: 'рҹ”“' },
    { id: 'developper',   label: 'DГ©velopper',     icon: 'рҹ“җ' },
    { id: 'factoriser',   label: 'Factoriser',     icon: 'рҹ§©' },
    { id: 'identites',    label: 'IdentitГ©s',      icon: 'рҹ’Ў' },
    { id: 'polynomes',    label: 'PolynГҙmes',      icon: 'рҹ“Ҡ' },
    { id: 'problemes',    label: 'ProblГЁmes',      icon: 'рҹ§ ' },
];

let objectifActif = 'comprendre';
let bonnes = 0, total = 0;
let currentExo = null;
let answered = false;

// в”Җв”Җ Utilitaires в”Җв”Җ
function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function signStr(n) { return n >= 0 ? '+ ' + n : 'вҲ’ ' + Math.abs(n); }
function termStr(coef, v) {
    if (coef === 0) return '';
    if (coef === 1) return v;
    if (coef === -1) return 'вҲ’' + v;
    return coef + v;
}
function polyStr(a, b, c, v) {
    // axВІ + bx + c
    let parts = [];
    if (a !== 0) parts.push(termStr(a, v + 'ВІ'));
    if (b !== 0) {
        const s = b > 0 && parts.length > 0 ? '+ ' + termStr(b, v) : termStr(b, v);
        parts.push(s);
    }
    if (c !== 0) {
        const s = c > 0 && parts.length > 0 ? '+ ' + c : '' + c;
        parts.push(s);
    }
    return parts.join(' ') || '0';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  GГүNГүRATEURS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function genComprendre() {
    const vars = ['x','y','a','n','t'];
    const v = pick(vars);
    const type = ri(1, 3);

    if (type === 1) {
        // Identifier variable/constante
        const coef = ri(2, 9);
        const cst = ri(1, 20);
        const expr = `${coef}${v} + ${cst}`;
        const options = [
            `Variable: ${v}, Constante: ${cst}`,
            `Variable: ${coef}, Constante: ${v}`,
            `Variable: ${cst}, Constante: ${v}`,
            `Variable: ${coef}${v}, Constante: ${cst}`,
        ];
        return {
            type: 'qcm', consigne: `Dans l'expression <strong>${expr}</strong>, identifie la variable et la constante :`,
            enonce: expr, options, correct: options[0],
            steps: `<strong>${v}</strong> est la variable (elle peut changer de valeur)<br><strong>${cst}</strong> est la constante (valeur fixe)<br><strong>${coef}</strong> est le coefficient de ${v}`
        };
    } else if (type === 2) {
        // ReconnaГ®tre coefficient
        const coef = ri(2, 12);
        const b = ri(1, 15);
        const expr = `${coef}${v} + ${b}`;
        return {
            type: 'input', consigne: `Quel est le coefficient de <strong>${v}</strong> dans l'expression <strong>${expr}</strong> ?`,
            enonce: expr, correct: coef.toString(),
            steps: `Dans ${coef}${v}, le nombre devant ${v} est <strong>${coef}</strong>, c'est le coefficient.`
        };
    } else {
        // Nombre de termes
        const a = ri(2, 8), b = ri(1, 7), c = ri(1, 10);
        const expr = `${a}${v}ВІ + ${b}${v} + ${c}`;
        return {
            type: 'input', consigne: `Combien de termes comporte l'expression <strong>${expr}</strong> ?`,
            enonce: expr, correct: '3',
            steps: `Les termes sont sГ©parГ©s par + ou вҲ’.<br>Terme 1 : <strong>${a}${v}ВІ</strong><br>Terme 2 : <strong>${b}${v}</strong><br>Terme 3 : <strong>${c}</strong><br>Il y a <strong>3 termes</strong>.`
        };
    }
}

function genEvaluer() {
    const v = 'x';
    const val = ri(-5, 8);
    const type = ri(1, 3);

    if (type === 1) {
        const a = ri(2, 7), b = ri(-10, 10);
        const result = a * val + b;
        return {
            type: 'input', consigne: `Calcule la valeur de l'expression pour <strong>${v} = ${val}</strong> :`,
            enonce: `${a}${v} ${signStr(b)}`, correct: result.toString(),
            steps: `${a} Г— ${val} ${signStr(b)}<br>= ${a * val} ${signStr(b)}<br>= <strong>${result}</strong>`
        };
    } else if (type === 2) {
        const a = ri(1, 5), b = ri(-6, 6), c = ri(-8, 8);
        const result = a * val * val + b * val + c;
        return {
            type: 'input', consigne: `Calcule pour <strong>${v} = ${val}</strong> :`,
            enonce: `${a}${v}ВІ ${signStr(b)}${v} ${signStr(c)}`,
            correct: result.toString(),
            steps: `${a}Г—(${val})ВІ ${signStr(b)}Г—(${val}) ${signStr(c)}<br>= ${a}Г—${val*val} ${signStr(b*val)} ${signStr(c)}<br>= ${a*val*val} ${signStr(b*val)} ${signStr(c)}<br>= <strong>${result}</strong>`
        };
    } else {
        const a = ri(2, 6), b = ri(1, 5);
        const result = a * val - b;
        return {
            type: 'input', consigne: `VГ©rifie : si <strong>${v} = ${val}</strong>, que vaut <strong>${a}${v} вҲ’ ${b}</strong> ?`,
            enonce: `${a}${v} вҲ’ ${b}`, correct: result.toString(),
            steps: `${a} Г— ${val} вҲ’ ${b} = ${a*val} вҲ’ ${b} = <strong>${result}</strong>`
        };
    }
}

function genSimplifier() {
    const v = pick(['x','y','a']);
    const type = ri(1, 3);

    if (type === 1) {
        // 2 termes semblables
        const a = ri(2, 9), b = ri(1, 8);
        const sum = a + b;
        return {
            type: 'input', consigne: `Simplifie en regroupant les termes semblables :`,
            enonce: `${a}${v} + ${b}${v}`,
            correct: `${sum}${v}`,
            steps: `${a}${v} et ${b}${v} sont des termes semblables (mГӘme variable ${v})<br>${a} + ${b} = ${sum}<br>= <strong>${sum}${v}</strong>`
        };
    } else if (type === 2) {
        const a = ri(2, 8), b = ri(1, 6), c = ri(1, 9), d = ri(1, 5);
        const sv = a + c, sc = b + d;
        return {
            type: 'input', consigne: `Simplifie :`,
            enonce: `${a}${v} + ${b} + ${c}${v} + ${d}`,
            correct: `${sv}${v} + ${sc}`,
            steps: `Termes en ${v} : ${a}${v} + ${c}${v} = ${sv}${v}<br>Constantes : ${b} + ${d} = ${sc}<br>= <strong>${sv}${v} + ${sc}</strong>`
        };
    } else {
        const a = ri(3, 10), b = ri(1, a-1);
        const diff = a - b;
        return {
            type: 'input', consigne: `Simplifie :`,
            enonce: `${a}${v} вҲ’ ${b}${v}`,
            correct: `${diff}${v}`,
            steps: `${a}${v} вҲ’ ${b}${v} = (${a} вҲ’ ${b})${v} = <strong>${diff}${v}</strong>`
        };
    }
}

function genParentheses() {
    const v = pick(['x','y','a']);
    const type = ri(1, 3);

    if (type === 1) {
        // +(a + b)
        const a = ri(2, 7), b = ri(1, 6), c = ri(1, 8);
        const r1 = a + c, r2 = b;
        return {
            type: 'input', consigne: `Supprime les parenthГЁses et simplifie :`,
            enonce: `${a}${v} + (${c}${v} + ${b})`,
            correct: `${r1}${v} + ${r2}`,
            steps: `Le signe + devant la parenthГЁse ne change rien :<br>${a}${v} + ${c}${v} + ${b}<br>= <strong>${r1}${v} + ${r2}</strong>`
        };
    } else if (type === 2) {
        // вҲ’(a + b)
        const a = ri(3, 9), b = ri(1, 5), c = ri(1, 6);
        const r1 = a - c, r2 = -b;
        const res = r1 > 0 ? `${r1}${v} ${signStr(r2)}` : `${r1}${v} ${signStr(r2)}`;
        return {
            type: 'input', consigne: `Supprime les parenthГЁses et simplifie :`,
            enonce: `${a}${v} вҲ’ (${c}${v} + ${b})`,
            correct: `${r1}${v} вҲ’ ${b}`,
            steps: `Le signe вҲ’ change les signes dans la parenthГЁse :<br>${a}${v} вҲ’ ${c}${v} вҲ’ ${b}<br>= (${a}вҲ’${c})${v} вҲ’ ${b}<br>= <strong>${r1}${v} вҲ’ ${b}</strong>`
        };
    } else {
        // Double parenthГЁses
        const a = ri(2, 6), b = ri(1, 4), c = ri(1, 5), d = ri(1, 3);
        const rV = a + c, rC = b - d;
        const resC = rC >= 0 ? `+ ${rC}` : `вҲ’ ${Math.abs(rC)}`;
        return {
            type: 'input', consigne: `Supprime les parenthГЁses et simplifie :`,
            enonce: `(${a}${v} + ${b}) + (${c}${v} вҲ’ ${d})`,
            correct: `${rV}${v} ${resC}`,
            steps: `${a}${v} + ${b} + ${c}${v} вҲ’ ${d}<br>= (${a}+${c})${v} + (${b}вҲ’${d})<br>= <strong>${rV}${v} ${resC}</strong>`
        };
    }
}

function genDevelopper() {
    const v = pick(['x','y','a']);
    const type = ri(1, 3);

    if (type === 1) {
        // k(a + b)
        const k = ri(2, 6), a = ri(1, 7), b = ri(1, 5);
        const ra = k * a, rb = k * b;
        return {
            type: 'input', consigne: `DГ©veloppe :`,
            enonce: `${k}(${a}${v} + ${b})`,
            correct: `${ra}${v} + ${rb}`,
            steps: `${k} Г— ${a}${v} + ${k} Г— ${b}<br>= <strong>${ra}${v} + ${rb}</strong>`
        };
    } else if (type === 2) {
        // k(a - b)
        const k = ri(2, 5), a = ri(1, 6), b = ri(1, 8);
        const ra = k * a, rb = k * b;
        return {
            type: 'input', consigne: `DГ©veloppe :`,
            enonce: `${k}(${a}${v} вҲ’ ${b})`,
            correct: `${ra}${v} вҲ’ ${rb}`,
            steps: `${k} Г— ${a}${v} вҲ’ ${k} Г— ${b}<br>= <strong>${ra}${v} вҲ’ ${rb}</strong>`
        };
    } else {
        // (a+b)(c+d)
        const a = ri(1, 4), b = ri(1, 5), c = ri(1, 4), d = ri(1, 5);
        const r1 = a * c, r2 = a * d + b * c, r3 = b * d;
        return {
            type: 'input', consigne: `DГ©veloppe et rГ©duis :`,
            enonce: `(${a}${v} + ${b})(${c}${v} + ${d})`,
            correct: `${r1}${v}ВІ + ${r2}${v} + ${r3}`,
            steps: `= ${a}${v}Г—${c}${v} + ${a}${v}Г—${d} + ${b}Г—${c}${v} + ${b}Г—${d}<br>= ${r1}${v}ВІ + ${a*d}${v} + ${b*c}${v} + ${r3}<br>= <strong>${r1}${v}ВІ + ${r2}${v} + ${r3}</strong>`
        };
    }
}

function genFactoriser() {
    const v = pick(['x','y','a']);
    const type = ri(1, 3);

    if (type === 1) {
        const k = ri(2, 7), a = ri(1, 6);
        return {
            type: 'input', consigne: `Factorise :`,
            enonce: `${k*a}${v} + ${k*ri(1,5)}`,
            correct: (() => { const b = ri(1,5); const expr = `${k*a}${v} + ${k*b}`; return `${k}(${a}${v} + ${b})`; })(),
            steps: (() => { const b = ri(1,5); return `Facteur commun : ${k}<br>${k*a}${v} = ${k} Г— ${a}${v}<br>${k*b} = ${k} Г— ${b}<br>= <strong>${k}(${a}${v} + ${b})</strong>`; })()
        };
    }
    // Re-generate properly
    const k = ri(2, 6), a = ri(1, 5), b = ri(1, 7);
    const ka = k * a, kb = k * b;
    return {
        type: 'input', consigne: `Factorise en trouvant le facteur commun :`,
        enonce: `${ka}${v} + ${kb}`,
        correct: `${k}(${a}${v} + ${b})`,
        steps: `PGCD(${ka}, ${kb}) = ${k}<br>${ka}${v} = ${k} Г— ${a}${v}<br>${kb} = ${k} Г— ${b}<br>= <strong>${k}(${a}${v} + ${b})</strong>`
    };
}

function genIdentites() {
    const v = pick(['x','y','a']);
    const type = ri(1, 3);

    if (type === 1) {
        // (a+b)ВІ
        const a = ri(1, 5), b = ri(1, 6);
        const r1 = a*a, r2 = 2*a*b, r3 = b*b;
        return {
            type: 'input', consigne: `DГ©veloppe en utilisant l'identitГ© remarquable <strong>(a+b)ВІ = aВІ+2ab+bВІ</strong> :`,
            enonce: `(${a}${v} + ${b})ВІ`,
            correct: `${r1}${v}ВІ + ${r2}${v} + ${r3}`,
            steps: `a = ${a}${v}, b = ${b}<br>aВІ = ${r1}${v}ВІ<br>2ab = 2Г—${a}${v}Г—${b} = ${r2}${v}<br>bВІ = ${r3}<br>= <strong>${r1}${v}ВІ + ${r2}${v} + ${r3}</strong>`
        };
    } else if (type === 2) {
        // (a-b)ВІ
        const a = ri(1, 5), b = ri(1, 6);
        const r1 = a*a, r2 = 2*a*b, r3 = b*b;
        return {
            type: 'input', consigne: `DГ©veloppe avec <strong>(aвҲ’b)ВІ = aВІвҲ’2ab+bВІ</strong> :`,
            enonce: `(${a}${v} вҲ’ ${b})ВІ`,
            correct: `${r1}${v}ВІ вҲ’ ${r2}${v} + ${r3}`,
            steps: `a = ${a}${v}, b = ${b}<br>aВІ = ${r1}${v}ВІ<br>2ab = ${r2}${v}<br>bВІ = ${r3}<br>= <strong>${r1}${v}ВІ вҲ’ ${r2}${v} + ${r3}</strong>`
        };
    } else {
        // (a+b)(a-b)
        const a = ri(1, 5), b = ri(1, 6);
        const r1 = a*a, r2 = b*b;
        return {
            type: 'input', consigne: `DГ©veloppe avec <strong>(a+b)(aвҲ’b) = aВІвҲ’bВІ</strong> :`,
            enonce: `(${a}${v} + ${b})(${a}${v} вҲ’ ${b})`,
            correct: `${r1}${v}ВІ вҲ’ ${r2}`,
            steps: `a = ${a}${v}, b = ${b}<br>aВІ = ${r1}${v}ВІ<br>bВІ = ${r2}<br>= <strong>${r1}${v}ВІ вҲ’ ${r2}</strong>`
        };
    }
}

function genPolynomes() {
    const v = 'x';
    const type = ri(1, 3);
    const a1 = ri(1,5), b1 = ri(-6,6), c1 = ri(-5,5);
    const a2 = ri(1,4), b2 = ri(-5,5), c2 = ri(-4,4);

    if (type === 1) {
        // Addition
        const ra = a1+a2, rb = b1+b2, rc = c1+c2;
        return {
            type: 'input', consigne: `Additionne ces deux polynГҙmes :`,
            enonce: `(${polyStr(a1,b1,c1,v)}) + (${polyStr(a2,b2,c2,v)})`,
            correct: polyStr(ra,rb,rc,v),
            steps: `${v}ВІ : ${a1} + ${a2} = ${ra}<br>${v} : ${b1} ${signStr(b2)} = ${rb}<br>Cst : ${c1} ${signStr(c2)} = ${rc}<br>= <strong>${polyStr(ra,rb,rc,v)}</strong>`
        };
    } else if (type === 2) {
        // Soustraction
        const ra = a1-a2, rb = b1-b2, rc = c1-c2;
        return {
            type: 'input', consigne: `Soustrais le second polynГҙme du premier :`,
            enonce: `(${polyStr(a1,b1,c1,v)}) вҲ’ (${polyStr(a2,b2,c2,v)})`,
            correct: polyStr(ra,rb,rc,v),
            steps: `On change les signes du 2e polynГҙme :<br>${v}ВІ : ${a1} вҲ’ ${a2} = ${ra}<br>${v} : ${b1} вҲ’ (${b2}) = ${rb}<br>Cst : ${c1} вҲ’ (${c2}) = ${rc}<br>= <strong>${polyStr(ra,rb,rc,v)}</strong>`
        };
    } else {
        // Multiplication simple (ax+b)(cx+d)
        const a = ri(1,3), b = ri(1,5), c = ri(1,3), d = ri(-4,4);
        const r1 = a*c, r2 = a*d+b*c, r3 = b*d;
        return {
            type: 'input', consigne: `Multiplie ces deux binГҙmes :`,
            enonce: `(${termStr(a,v)} + ${b})(${termStr(c,v)} ${signStr(d)})`,
            correct: polyStr(r1,r2,r3,v),
            steps: `= ${a*c}${v}ВІ ${signStr(a*d)}${v} + ${b*c}${v} ${signStr(b*d)}<br>= ${r1}${v}ВІ ${signStr(r2)}${v} ${signStr(r3)}<br>= <strong>${polyStr(r1,r2,r3,v)}</strong>`
        };
    }
}

function genProblemes() {
    const type = ri(1, 3);

    if (type === 1) {
        const age = ri(8, 14);
        const diff = ri(2, 5);
        const total = 2 * age + diff;
        return {
            type: 'input', consigne: `Traduis et rГ©sous : <strong>La somme des Гўges de deux frГЁres est ${total}. L'aГ®nГ© a ${diff} ans de plus que le cadet.</strong> Quel est l'Гўge du cadet ?`,
            enonce: `x + (x + ${diff}) = ${total}`,
            correct: age.toString(),
            steps: `Soit x l'Гўge du cadet.<br>L'aГ®nГ© : x + ${diff}<br>x + (x + ${diff}) = ${total}<br>2x + ${diff} = ${total}<br>2x = ${total - diff}<br>x = ${(total - diff)/2}<br>Le cadet a <strong>${age} ans</strong>.`
        };
    } else if (type === 2) {
        const prix = ri(5, 20);
        const nb = ri(3, 8);
        const total = prix * nb;
        return {
            type: 'input', consigne: `<strong>${nb} cahiers identiques coГ»tent ${total}вӮ¬.</strong> Quel est le prix d'un cahier ?`,
            enonce: `${nb}x = ${total}`,
            correct: prix.toString(),
            steps: `${nb}x = ${total}<br>x = ${total} Г· ${nb}<br>x = <strong>${prix}вӮ¬</strong>`
        };
    } else {
        const l = ri(3, 10);
        const add = ri(2, 6);
        const perim = 2 * (l + l + add);
        return {
            type: 'input', consigne: `<strong>Un rectangle a un pГ©rimГЁtre de ${perim} cm. Sa longueur dГ©passe sa largeur de ${add} cm.</strong> Quelle est la largeur ?`,
            enonce: `2(x + x + ${add}) = ${perim}`,
            correct: l.toString(),
            steps: `Soit x la largeur, la longueur = x + ${add}<br>PГ©rimГЁtre = 2(x + x + ${add}) = ${perim}<br>2(2x + ${add}) = ${perim}<br>4x + ${2*add} = ${perim}<br>4x = ${perim - 2*add}<br>x = ${l}<br>La largeur est <strong>${l} cm</strong>.`
        };
    }
}

const GENERATORS = {
    'comprendre':  genComprendre,
    'evaluer':     genEvaluer,
    'simplifier':  genSimplifier,
    'parentheses': genParentheses,
    'developper':  genDevelopper,
    'factoriser':  genFactoriser,
    'identites':   genIdentites,
    'polynomes':   genPolynomes,
    'problemes':   genProblemes,
};

function buildTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = '';
    OBJECTIFS.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (o.id === objectifActif ? ' active' : '');
        btn.textContent = o.icon + ' ' + o.label;
        btn.onclick = () => { objectifActif = o.id; buildTabs(); genExo(); };
        el.appendChild(btn);
    });
}

function genExo() {
    answered = false;
    currentExo = GENERATORS[objectifActif]();
    renderExo();
}

function renderExo() {
    const exo = currentExo;
    document.getElementById('consigne').innerHTML = exo.consigne;
    document.getElementById('enonce').innerHTML = exo.enonce;
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('btn-suivant').style.display = 'none';
    document.getElementById('btn-valider').style.display = 'block';

    const zone = document.getElementById('reponse-zone');
    zone.innerHTML = '';

    if (exo.type === 'qcm') {
        const grid = document.createElement('div');
        grid.className = 'qcm-grid';
        exo.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'qcm-btn';
            btn.textContent = opt;
            btn.onclick = () => {
                if (answered) return;
                grid.querySelectorAll('.qcm-btn').forEach(b => { b.classList.remove('selected'); b.style.borderColor = ''; b.style.background = ''; });
                btn.classList.add('selected');
            };
            grid.appendChild(btn);
        });
        zone.appendChild(grid);
    } else {
        zone.innerHTML = `<div class="answer-row"><input type="text" class="ans-input" id="ans-val" placeholder="Ta rГ©ponseвҖҰ" autocomplete="off"></div>`;
        setTimeout(() => {
            const inp = document.getElementById('ans-val');
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') valider(); });
            inp.focus();
        }, 50);
    }
}

function normalize(s) {
    return s.replace(/\s+/g, ' ').replace(/\s*([+\-Г—Г·=ВІ])\s*/g, ' $1 ').trim().toLowerCase()
            .replace(/\*/g, 'Г—').replace(/\^2/g, 'ВІ');
}

function valider() {
    if (answered) return;
    const exo = currentExo;
    let isCorrect = false;
    let userAnswer = '';

    if (exo.type === 'qcm') {
        const sel = document.querySelector('.qcm-btn.selected');
        if (!sel) return;
        userAnswer = sel.textContent;
        isCorrect = userAnswer === exo.correct;
        document.querySelectorAll('.qcm-btn').forEach(b => {
            if (b.textContent === exo.correct) b.classList.add('correct');
            else if (b === sel && !isCorrect) b.classList.add('wrong');
        });
    } else {
        const inp = document.getElementById('ans-val');
        if (!inp.value.trim()) return;
        userAnswer = inp.value.trim();
        isCorrect = normalize(userAnswer) === normalize(exo.correct);
    }

    answered = true;
    total++;
    if (isCorrect) bonnes++;
    document.getElementById('sc-bon').textContent = bonnes;
    document.getElementById('sc-total').textContent = total;

    // Sauvegarder dans Firebase
    if (typeof saveScore === 'function') {
        saveScore('algebre', objectifActif, isCorrect).then(() => {
            if (typeof checkBadges === 'function') checkBadges();
        });
    }

    const fbBox = document.getElementById('feedback-box');
    const fbResult = document.getElementById('feedback-result');
    const fbSteps = document.getElementById('feedback-steps');

    fbBox.style.display = 'flex';
    if (isCorrect) {
        fbResult.innerHTML = 'вң“ Correct !';
        fbResult.className = 'fb-ok';
    } else {
        fbResult.innerHTML = `вң— La bonne rГ©ponse Г©tait : <strong>${exo.correct}</strong>`;
        fbResult.className = 'fb-ko';
    }
    fbSteps.innerHTML = exo.steps;

    document.getElementById('btn-valider').style.display = 'none';
    document.getElementById('btn-suivant').style.display = 'block';
    fbBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function suivant() {
    genExo();
    document.getElementById('exercice-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

buildTabs();
genExo();
