<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer mon avatar – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#040804,#061008,#081a0e,#040804);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .content{width:100%;max-width:480px;padding:20px 16px 60px;display:flex;flex-direction:column;gap:18px;align-items:center}
        .nav{width:100%;display:flex;justify-content:flex-start}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600}
        .nav a:hover{color:#2ecc71}
        h1{font-size:20px;font-weight:800;text-align:center;color:#2ecc71}

        /* Preview */
        .preview-wrap{width:180px;height:180px;border-radius:50%;background:rgba(10,30,16,0.6);border:3px solid rgba(46,204,113,0.3);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
        .avatar-preview{width:160px;height:160px;position:relative}
        .av-layer{position:absolute;top:0;left:0;width:100%;height:100%}

        /* Options */
        .option-section{width:100%;background:rgba(10,30,16,0.5);border:1px solid rgba(40,100,55,0.2);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
        .opt-title{font-size:12px;font-weight:700;color:rgba(46,204,113,0.5);text-transform:uppercase;letter-spacing:0.06em}
        .opt-row{display:flex;gap:8px;flex-wrap:wrap}
        .opt-btn{width:44px;height:44px;border-radius:12px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.15s}
        .opt-btn:hover{border-color:rgba(46,204,113,0.3)}
        .opt-btn.selected{border-color:#2ecc71;background:rgba(46,204,113,0.12);box-shadow:0 0 10px rgba(46,204,113,0.2)}
        .color-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.15s}
        .color-btn:hover{border-color:rgba(255,255,255,0.3);transform:scale(1.1)}
        .color-btn.selected{border-color:#2ecc71;transform:scale(1.15);box-shadow:0 0 10px rgba(46,204,113,0.3)}

        .btn-save{width:100%;background:#2ecc71;color:#040804;border:none;border-radius:12px;padding:16px;font-size:16px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:opacity 0.15s}
        .btn-save:hover{opacity:0.85}
        #save-fb{font-size:12px;text-align:center;min-height:16px;color:#2ecc71}
    </style>
</head>
<body>
<div class="content">
    <div class="nav"><a href="profil.html">← Mon profil</a></div>
    <h1>🎨 Crée ton avatar</h1>

    <div class="preview-wrap">
        <svg class="avatar-preview" viewBox="0 0 200 200" id="avatar-svg"></svg>
    </div>

    <div class="option-section">
        <div class="opt-title">Couleur de peau</div>
        <div class="opt-row" id="skin-colors"></div>
    </div>

    <div class="option-section">
        <div class="opt-title">Cheveux</div>
        <div class="opt-row" id="hair-styles"></div>
    </div>

    <div class="option-section">
        <div class="opt-title">Couleur des cheveux</div>
        <div class="opt-row" id="hair-colors"></div>
    </div>

    <div class="option-section">
        <div class="opt-title">Yeux</div>
        <div class="opt-row" id="eye-styles"></div>
    </div>

    <div class="option-section">
        <div class="opt-title">Bouche</div>
        <div class="opt-row" id="mouth-styles"></div>
    </div>

    <div class="option-section">
        <div class="opt-title">Accessoires</div>
        <div class="opt-row" id="accessories"></div>
    </div>

    <button class="btn-save" onclick="saveAvatar()">Enregistrer mon avatar</button>
    <div id="save-fb"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>
let currentUser = null;

const SKINS = ['#FDDBB4','#F1C27D','#E0A370','#C68642','#8D5524','#5C3A1E','#FFE0BD','#FFCD94'];
const HAIR_COLORS = ['#2C1B0E','#4A2912','#8B4513','#D4A574','#F5DEB3','#FFD700','#FF4500','#C41E3A','#1A1A2E','#4169E1','#9370DB','#FF69B4'];

const HAIR_STYLES = [
    {id:'none',label:'Aucun',icon:'🚫'},
    {id:'short',label:'Court',icon:'👦'},
    {id:'medium',label:'Mi-long',icon:'🧑'},
    {id:'long',label:'Long',icon:'👩'},
    {id:'curly',label:'Bouclé',icon:'🧑‍🦱'},
    {id:'afro',label:'Afro',icon:'👩‍🦱'},
    {id:'mohawk',label:'Crête',icon:'🤘'},
    {id:'bun',label:'Chignon',icon:'💇‍♀️'},
];

const EYE_STYLES = [
    {id:'normal',label:'Normal',icon:'👀'},
    {id:'happy',label:'Joyeux',icon:'😊'},
    {id:'wink',label:'Clin d\'œil',icon:'😉'},
    {id:'cool',label:'Cool',icon:'😎'},
    {id:'big',label:'Grand',icon:'🥺'},
    {id:'sleepy',label:'Fatigué',icon:'😴'},
];

const MOUTH_STYLES = [
    {id:'smile',label:'Sourire',icon:'😊'},
    {id:'grin',label:'Grand sourire',icon:'😁'},
    {id:'neutral',label:'Neutre',icon:'😐'},
    {id:'tongue',label:'Langue',icon:'😛'},
    {id:'surprised',label:'Surpris',icon:'😮'},
    {id:'smirk',label:'Malin',icon:'😏'},
];

const ACCESSORIES_LIST = [
    {id:'none',label:'Aucun',icon:'🚫'},
    {id:'glasses',label:'Lunettes',icon:'👓'},
    {id:'sunglasses',label:'Solaires',icon:'🕶️'},
    {id:'hat',label:'Casquette',icon:'🧢'},
    {id:'headband',label:'Bandeau',icon:'🎀'},
    {id:'earrings',label:'Boucles',icon:'💎'},
];

let config = {
    skin: SKINS[0],
    hair: 'short',
    hairColor: HAIR_COLORS[0],
    eyes: 'normal',
    mouth: 'smile',
    accessory: 'none',
};

requireAuth((user, profile) => {
    currentUser = user;
    if (profile.avatarConfig) {
        config = {...config, ...profile.avatarConfig};
    }
    buildUI();
    render();
});

function buildUI() {
    // Skin colors
    const skinEl = document.getElementById('skin-colors');
    SKINS.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'color-btn' + (config.skin === c ? ' selected' : '');
        btn.style.background = c;
        btn.onclick = () => { config.skin = c; refreshSelected(skinEl, c, SKINS); render(); };
        skinEl.appendChild(btn);
    });

    // Hair styles
    buildOptionBtns('hair-styles', HAIR_STYLES, 'hair');

    // Hair colors
    const hcEl = document.getElementById('hair-colors');
    HAIR_COLORS.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'color-btn' + (config.hairColor === c ? ' selected' : '');
        btn.style.background = c;
        btn.onclick = () => { config.hairColor = c; refreshSelected(hcEl, c, HAIR_COLORS); render(); };
        hcEl.appendChild(btn);
    });

    // Eyes
    buildOptionBtns('eye-styles', EYE_STYLES, 'eyes');

    // Mouth
    buildOptionBtns('mouth-styles', MOUTH_STYLES, 'mouth');

    // Accessories
    buildOptionBtns('accessories', ACCESSORIES_LIST, 'accessory');
}

function buildOptionBtns(containerId, items, configKey) {
    const el = document.getElementById(containerId);
    items.forEach(item => {
        const btn = document.createElement('div');
        btn.className = 'opt-btn' + (config[configKey] === item.id ? ' selected' : '');
        btn.textContent = item.icon;
        btn.title = item.label;
        btn.onclick = () => {
            config[configKey] = item.id;
            el.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            render();
        };
        el.appendChild(btn);
    });
}

function refreshSelected(container, val, arr) {
    const btns = container.querySelectorAll('.color-btn');
    btns.forEach((b, i) => b.classList.toggle('selected', arr[i] === val));
}

function render() {
    const svg = document.getElementById('avatar-svg');
    const s = config;

    // Ombre
    let html = `<defs>
        <radialGradient id="faceGrad"><stop offset="0%" stop-color="${s.skin}"/><stop offset="100%" stop-color="${darken(s.skin,20)}"/></radialGradient>
        <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/></filter>
    </defs>`;

    // Cou
    html += `<rect x="80" y="140" width="40" height="30" rx="10" fill="${darken(s.skin,10)}"/>`;

    // Visage
    html += `<ellipse cx="100" cy="110" rx="65" ry="70" fill="url(#faceGrad)" filter="url(#shadow)"/>`;

    // Oreilles
    html += `<ellipse cx="37" cy="108" rx="12" ry="16" fill="${s.skin}"/>`;
    html += `<ellipse cx="163" cy="108" rx="12" ry="16" fill="${s.skin}"/>`;

    // Cheveux
    html += renderHair(s);

    // Yeux
    html += renderEyes(s);

    // Nez
    html += `<ellipse cx="100" cy="118" rx="5" ry="4" fill="${darken(s.skin,15)}" opacity="0.5"/>`;

    // Bouche
    html += renderMouth(s);

    // Joues (blush)
    html += `<ellipse cx="68" cy="125" rx="12" ry="8" fill="#FF9999" opacity="0.15"/>`;
    html += `<ellipse cx="132" cy="125" rx="12" ry="8" fill="#FF9999" opacity="0.15"/>`;

    // Accessoires
    html += renderAccessory(s);

    svg.innerHTML = html;
}

function renderHair(s) {
    const c = s.hairColor;
    const dc = darken(c, 20);
    switch(s.hair) {
        case 'none': return '';
        case 'short': return `<ellipse cx="100" cy="70" rx="62" ry="42" fill="${c}"/><ellipse cx="100" cy="65" rx="55" ry="35" fill="${dc}"/>`;
        case 'medium': return `<ellipse cx="100" cy="70" rx="65" ry="45" fill="${c}"/><ellipse cx="100" cy="68" rx="58" ry="38" fill="${dc}"/><ellipse cx="55" cy="110" rx="18" ry="35" fill="${c}"/><ellipse cx="145" cy="110" rx="18" ry="35" fill="${c}"/>`;
        case 'long': return `<ellipse cx="100" cy="70" rx="65" ry="45" fill="${c}"/><ellipse cx="100" cy="68" rx="58" ry="38" fill="${dc}"/><ellipse cx="48" cy="120" rx="20" ry="55" fill="${c}"/><ellipse cx="152" cy="120" rx="20" ry="55" fill="${c}"/>`;
        case 'curly': return `<ellipse cx="100" cy="72" rx="68" ry="48" fill="${c}"/>${[60,80,100,120,140].map(x=>`<circle cx="${x}" cy="55" r="14" fill="${dc}"/>`).join('')}<ellipse cx="50" cy="105" rx="18" ry="30" fill="${c}"/><ellipse cx="150" cy="105" rx="18" ry="30" fill="${c}"/>`;
        case 'afro': return `<ellipse cx="100" cy="85" rx="80" ry="65" fill="${c}"/><ellipse cx="100" cy="80" rx="72" ry="58" fill="${dc}"/>`;
        case 'mohawk': return `<rect x="85" y="25" width="30" height="50" rx="10" fill="${c}"/><rect x="88" y="20" width="24" height="45" rx="8" fill="${dc}"/>`;
        case 'bun': return `<ellipse cx="100" cy="70" rx="62" ry="42" fill="${c}"/><ellipse cx="100" cy="65" rx="55" ry="35" fill="${dc}"/><circle cx="100" cy="35" r="22" fill="${c}"/><circle cx="100" cy="33" r="18" fill="${dc}"/>`;
        default: return '';
    }
}

function renderEyes(s) {
    switch(s.eyes) {
        case 'normal': return `<ellipse cx="78" cy="102" rx="9" ry="10" fill="white"/><circle cx="80" cy="103" r="5" fill="#2C1B0E"/><circle cx="82" cy="101" r="2" fill="white"/><ellipse cx="122" cy="102" rx="9" ry="10" fill="white"/><circle cx="120" cy="103" r="5" fill="#2C1B0E"/><circle cx="122" cy="101" r="2" fill="white"/>`;
        case 'happy': return `<path d="M 70 102 Q 78 96 86 102" stroke="#2C1B0E" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M 114 102 Q 122 96 130 102" stroke="#2C1B0E" stroke-width="3" fill="none" stroke-linecap="round"/>`;
        case 'wink': return `<ellipse cx="78" cy="102" rx="9" ry="10" fill="white"/><circle cx="80" cy="103" r="5" fill="#2C1B0E"/><circle cx="82" cy="101" r="2" fill="white"/><path d="M 114 103 Q 122 97 130 103" stroke="#2C1B0E" stroke-width="3" fill="none" stroke-linecap="round"/>`;
        case 'cool': return `<rect x="62" y="96" width="32" height="14" rx="7" fill="#1a1a2e" opacity="0.8"/><rect x="106" y="96" width="32" height="14" rx="7" fill="#1a1a2e" opacity="0.8"/><line x1="94" y1="103" x2="106" y2="103" stroke="#1a1a2e" stroke-width="2" opacity="0.5"/>`;
        case 'big': return `<ellipse cx="78" cy="102" rx="12" ry="14" fill="white"/><circle cx="80" cy="104" r="7" fill="#2C1B0E"/><circle cx="83" cy="101" r="3" fill="white"/><ellipse cx="122" cy="102" rx="12" ry="14" fill="white"/><circle cx="120" cy="104" r="7" fill="#2C1B0E"/><circle cx="123" cy="101" r="3" fill="white"/>`;
        case 'sleepy': return `<path d="M 68 104 Q 78 108 88 104" stroke="#2C1B0E" stroke-width="2.5" fill="none"/><path d="M 112 104 Q 122 108 132 104" stroke="#2C1B0E" stroke-width="2.5" fill="none"/>`;
        default: return '';
    }
}

function renderMouth(s) {
    switch(s.mouth) {
        case 'smile': return `<path d="M 82 132 Q 100 145 118 132" stroke="#C0392B" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        case 'grin': return `<path d="M 78 130 Q 100 150 122 130" stroke="#C0392B" stroke-width="2" fill="white" stroke-linecap="round"/>`;
        case 'neutral': return `<line x1="85" y1="134" x2="115" y2="134" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>`;
        case 'tongue': return `<path d="M 82 132 Q 100 145 118 132" stroke="#C0392B" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="100" cy="142" rx="8" ry="6" fill="#E74C3C"/>`;
        case 'surprised': return `<ellipse cx="100" cy="136" rx="10" ry="12" fill="#C0392B" opacity="0.8"/>`;
        case 'smirk': return `<path d="M 85 133 Q 105 140 118 130" stroke="#C0392B" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        default: return '';
    }
}

function renderAccessory(s) {
    switch(s.accessory) {
        case 'none': return '';
        case 'glasses': return `<circle cx="78" cy="103" r="16" fill="none" stroke="#333" stroke-width="2.5"/><circle cx="122" cy="103" r="16" fill="none" stroke="#333" stroke-width="2.5"/><line x1="94" y1="103" x2="106" y2="103" stroke="#333" stroke-width="2"/>`;
        case 'sunglasses': return `<rect x="60" y="94" width="34" height="20" rx="6" fill="#1a1a2e" opacity="0.85"/><rect x="106" y="94" width="34" height="20" rx="6" fill="#1a1a2e" opacity="0.85"/><line x1="94" y1="103" x2="106" y2="103" stroke="#333" stroke-width="2.5"/>`;
        case 'hat': return `<rect x="50" y="52" width="100" height="20" rx="10" fill="#2C3E50"/><rect x="65" y="30" width="70" height="28" rx="8" fill="#2C3E50"/><rect x="60" y="48" width="80" height="8" rx="3" fill="#E74C3C"/>`;
        case 'headband': return `<rect x="38" y="72" width="124" height="8" rx="4" fill="#E74C3C"/><circle cx="55" cy="68" r="8" fill="#E74C3C"/><circle cx="55" cy="68" r="5" fill="#C0392B"/>`;
        case 'earrings': return `<circle cx="37" cy="125" r="5" fill="#F1C40F" opacity="0.9"/><circle cx="163" cy="125" r="5" fill="#F1C40F" opacity="0.9"/>`;
        default: return '';
    }
}

function darken(hex, pct) {
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);
    r = Math.max(0, r - pct); g = Math.max(0, g - pct); b = Math.max(0, b - pct);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

async function saveAvatar() {
    if (!currentUser) return;
    const fb = document.getElementById('save-fb');

    // Sauvegarder la config + le SVG en string
    const svgStr = document.getElementById('avatar-svg').outerHTML;

    try {
        await db.collection('users').doc(currentUser.uid).update({
            avatarConfig: config,
            avatarSVG: svgStr,
        });
        fb.textContent = '✓ Avatar enregistré !';
        setTimeout(() => { window.location.href = 'profil.html'; }, 1000);
    } catch(e) {
        fb.textContent = 'Erreur: ' + e.message;
        fb.style.color = '#e74c3c';
    }
}
</script>
</body>
</html>
