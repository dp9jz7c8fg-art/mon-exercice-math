<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#040804,#061008,#081a0e,#0a2414,#040804);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .content{width:100%;max-width:600px;padding:20px 14px 60px;display:flex;flex-direction:column;gap:20px}

        /* Profile card */
        .profile-card{background:rgba(10,30,16,0.55);border:2px solid rgba(40,100,55,0.3);border-radius:16px;padding:16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;backdrop-filter:blur(12px);position:relative;overflow-x:hidden}
        .profile-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 40% 40%,rgba(46,204,113,0.03),transparent 50%);pointer-events:none}
        .avatar-big{font-size:46px;width:76px;height:76px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(46,204,113,0.06);border:3px solid rgba(46,204,113,0.25);box-shadow:0 0 25px rgba(46,204,113,0.08);cursor:pointer;transition:border-color 0.2s}
        .avatar-big:hover{border-color:rgba(46,204,113,0.5)}
        .profile-name{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .profile-email{font-size:12px;color:rgba(255,255,255,0.3)}
        .profile-joined{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.06em;text-transform:uppercase}
        .btn-avatar{background:rgba(46,204,113,0.06);border:1px solid rgba(46,204,113,0.15);border-radius:8px;padding:8px 16px;color:rgba(46,204,113,0.5);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s}
        .btn-avatar:hover{border-color:rgba(46,204,113,0.4);color:#2ecc71}

        /* Sections */
        .section{background:rgba(10,30,16,0.5);border:2px solid rgba(40,100,55,0.25);border-radius:16px;padding:18px 16px;display:flex;flex-direction:column;gap:10px}
        .section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;color:#e8f5e9}

        /* RDV */
        .rdv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,0.15);border-radius:10px}
        .rdv-icon{font-size:18px;flex-shrink:0}
        .rdv-text{font-size:13px;font-weight:600;color:#e8f5e9}
        .rdv-date{font-size:11px;color:rgba(255,255,255,0.25);margin-left:auto}
        .no-items{font-size:12px;color:rgba(255,255,255,0.2);text-align:center;padding:8px}

        /* Objectifs */
        .obj-mini{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.12);border-radius:8px}
        .obj-mini-status{font-size:12px;font-weight:700;width:20px;text-align:center}
        .obj-mini-text{font-size:12px;color:rgba(255,255,255,0.6);flex:1}
        .obj-mini.done{opacity:0.3}
        .obj-mini.done .obj-mini-text{text-decoration:line-through}

        /* Badges summary */
        .badges-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
        .badges-row span{font-size:28px;cursor:default;transition:transform 0.15s;display:inline-block}
        .badges-row span:hover{transform:scale(1.25)}
        .badges-link{color:rgba(46,204,113,0.6);font-size:12px;font-weight:600;text-decoration:none;text-align:center;margin-top:4px;display:block}
        .badges-link:hover{color:#2ecc71}

        /* ══════════════════════════════════════════════
           CARTE MENTALE SKETCHNOTE
           ══════════════════════════════════════════════ */
        .mindmap-wrap{position:relative;width:100%;overflow-x:hidden;border-radius:16px;background:rgba(10,30,16,0.4);border:1px solid rgba(40,100,55,0.2);min-height:400px}
        .mindmap-svg{width:100%;height:auto;display:block}

        .btn-edit-profile{display:block;width:100%;background:rgba(46,204,113,0.06);border:1px dashed rgba(46,204,113,0.3);border-radius:12px;padding:14px;text-align:center;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:700;color:rgba(46,204,113,0.6);cursor:pointer;transition:all 0.15s;text-decoration:none}
        .btn-edit-profile:hover{background:rgba(46,204,113,0.12);border-color:rgba(46,204,113,0.5);color:#2ecc71}

        #loading-screen{display:flex;align-items:center;justify-content:center;min-height:50vh;font-size:14px;color:rgba(255,255,255,0.35);gap:10px}
        .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:#2ecc71;border-radius:50%;animation:spin 0.7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    
        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid { grid-template-columns: 1fr !important; }
            .grid-2 { gap: 12px !important; }
            .space-card { padding: 22px 16px !important; }
            .space-icon { width: 60px !important; height: 60px !important; font-size: 36px !important; }
            .space-title { font-size: 17px !important; }
            .space-desc { font-size: 11px !important; }
            .card { padding: 18px 14px !important; gap: 10px !important; }
            .card-icon { width: 50px !important; height: 50px !important; font-size: 28px !important; }
            .card-title { font-size: 14px !important; }
            .card-desc { font-size: 11px !important; }
            .p-card { padding: 18px 12px !important; }
            .p-card-icon { width: 48px !important; height: 48px !important; font-size: 28px !important; }
            .eleve-profile { padding: 10px 14px !important; gap: 10px !important; }
            .ep-avatar { width: 44px !important; height: 44px !important; font-size: 28px !important; }
            .ep-name { font-size: 14px !important; }
            .section { padding: 16px 14px !important; }
            .section-title { font-size: 13px !important; }
            .welcome-title, .page-title { font-size: 20px !important; }
            .logo-wrap { padding: 10px 24px !important; }
            .logo-wrap img { max-height: 48px !important; }
            #breadcrumb { font-size: 10px !important; padding: 6px 12px !important; }
            body { padding-top: 32px !important; }
            .stats-row { gap: 6px !important; }
            .stat-box { padding: 10px 8px !important; }
            .stat-val { font-size: 20px !important; }
            .stat-label { font-size: 8px !important; }
            .btn-save, .btn-submit, .id-btn, .add-btn { padding: 14px !important; font-size: 14px !important; }
            .avis-wrap { height: 44px !important; }
            .avis-text { font-size: 11px !important; }
            .social-row { gap: 12px !important; }
            .social-link { width: 40px !important; height: 40px !important; }
            .footer { font-size: 8px !important; }
            .stef-inline { width: 32px !important; height: 32px !important; font-size: 18px !important; }
            .agenda-btn { width: 40px !important; height: 40px !important; font-size: 18px !important; }
            .tab { padding: 6px 10px !important; font-size: 10px !important; }
            .ans-input { width: 100% !important; font-size: 16px !important; }
            .expr-display { font-size: 16px !important; padding: 12px !important; }
            .qcm-grid { grid-template-columns: 1fr !important; }
            .qcm-btn { padding: 12px !important; font-size: 14px !important; }
            .profile-card { padding: 20px 16px !important; }
            .avatar-big { width: 80px !important; height: 80px !important; font-size: 48px !important; }
            .profile-name { font-size: 20px !important; }
            .mindmap-svg { height: auto !important; }
            .content { padding-left: 12px !important; padding-right: 12px !important; }
            .id-box { padding: 20px 16px !important; }
            .role-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
            .role-btn { padding: 12px 10px !important; font-size: 13px !important; }
            .role-icon { width: 34px !important; height: 34px !important; font-size: 20px !important; }
            .add-row { flex-direction: column !important; }
            .add-btn { width: 100% !important; }
            .obj-card { padding: 10px 12px !important; }
            .section-dashed { padding: 16px 14px !important; }
        }
        
</style>
</head>
<body>

<div class="content">
    <div id="loading-screen"><div class="spinner"></div><span>Chargement du profil…</span></div>

    <div id="profile-content" style="display:none;flex-direction:column;gap:20px;">

        <!-- Carte profil -->
        <div class="profile-card" style="flex-direction:row;align-items:flex-start;gap:16px;padding:16px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;">
                <div class="avatar-big" id="avatar-display" title="Mon avatar">🦊</div>
                <button class="btn-avatar" onclick="window.location.href='avatar-creator.html'" style="font-size:11px;padding:6px 12px;">🎨 Modifier</button>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;">
                <div class="profile-name" id="profile-name" style="font-size:18px;">Élève</div>
                <div class="profile-email" id="profile-email" style="font-size:12px;"></div>
                <div class="profile-phone" id="profile-phone" style="font-size:12px;color:rgba(255,255,255,0.3);"></div>
                <div class="profile-joined" id="profile-joined" style="font-size:10px;margin-top:4px;"></div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="section">
            <div class="section-title">📈 Ma progression & chronologie</div>
            <div id="timeline-content" style="display:flex;flex-direction:column;gap:0;">
                <div class="no-items">Chargement…</div>
            </div>
        </div>

        <!-- Participation ateliers -->
        <div class="section">
            <div class="section-title">🎓 Ma participation aux cours & ateliers</div>
            <div id="participation-list"><div class="no-items">Chargement…</div></div>
        </div>

        <!-- Succès -->
        <div class="section">
            <div class="section-title">🏆 Succès</div>
            <div class="badges-row" id="badges-summary"></div>
            <a href="badges.html" class="badges-link">Voir tous les succès →</a>
        </div>

        <!-- Profil d'apprentissage (Carte mentale) -->
        <div class="section">
            <div class="section-title">📚 Mon profil d'apprentissage</div>
            <div class="mindmap-wrap" id="mindmap-container">
                <div class="no-items">Chargement…</div>
            </div>
            <a href="profil-edit.html" class="btn-edit-profile">✏️ Modifier mon profil d'apprentissage</a>
        </div>

    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script src="badges-system.js"></script>
<script src="theme.js"></script>
<script src="breadcrumb.js"></script>

<script>
let currentUser = null;
let currentProfile = null;

requireAuth((user, profile) => {
    currentUser = user;
    currentProfile = profile;

    document.getElementById('loading-screen').style.display = 'none';
    const content = document.getElementById('profile-content');
    content.style.display = 'flex';

    renderProfile(profile);
    renderTimeline();
    renderBadgesSummary(profile);
    renderParticipation();
    renderMindmap(profile);
});

function renderProfile(p) {
    // Avatar
    const avatarEl = document.getElementById('avatar-display');
    if (p.avatarSVG) {
        avatarEl.innerHTML = p.avatarSVG;
        avatarEl.style.fontSize = '0';
        const svg = avatarEl.querySelector('svg');
        if (svg) { svg.style.width = '100%'; svg.style.height = '100%'; }
    } else if (p.avatarType === 'initials') {
        avatarEl.textContent = p.avatar || '??';
        avatarEl.style.fontSize = '28px';
        avatarEl.style.fontWeight = '800';
        avatarEl.style.color = '#2ecc71';
    } else {
        avatarEl.textContent = p.avatar || '🦊';
    }

    document.getElementById('profile-name').textContent = (p.name || '') + ' ' + (p.lastname || '');
    document.getElementById('profile-email').textContent = p.email || '';
    document.getElementById('profile-phone').textContent = p.phone || '';

    if (p.createdAt) {
        const d = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
        document.getElementById('profile-joined').textContent = 'Membre depuis ' + d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    }
}

async function renderTimeline() {
    const container = document.getElementById('timeline-content');
    try {
        // Charger RDV + objectifs en parallèle
        const [rdvSnap, objSnap] = await Promise.all([
            db.collection('bookings').where('userId','==',currentUser.uid).orderBy('createdAt','desc').limit(10).get(),
            db.collection('objectifs').where('userId','==',currentUser.uid).orderBy('createdAt','desc').get()
        ]);

        const events = [];

        rdvSnap.forEach(doc => {
            const d = doc.data();
            const ts = d.createdAt ? d.createdAt.toDate() : new Date();
            events.push({ type:'rdv', date:ts, day:d.day, time:d.time, week:d.weekStart });
        });

        objSnap.forEach(doc => {
            const d = doc.data();
            const ts = d.createdAt ? d.createdAt.toDate() : new Date();
            events.push({ type:'obj', date:ts, text:d.text, status:d.status||'not-started', author:d.addedBy||'eleve' });
        });

        if (events.length === 0) { container.innerHTML = '<div class="no-items">Aucun événement pour le moment</div>'; return; }

        events.sort((a,b) => b.date - a.date);

        const STATUS_EMOJI = {'not-started':'⬜','in-progress':'🟡','completed':'✅'};
        const STATUS_COLOR = {'not-started':'rgba(255,255,255,0.2)','in-progress':'#f39c12','completed':'#2ecc71'};

        let html = '<div style="position:relative;padding-left:20px;">';
        // Ligne verticale
        html += '<div style="position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:rgba(46,204,113,0.15);border-radius:1px;"></div>';

        events.forEach((ev, i) => {
            const dateStr = ev.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
            const dotColor = ev.type==='rdv' ? '#2ecc71' : (STATUS_COLOR[ev.status]||'rgba(255,255,255,0.2)');
            const icon = ev.type==='rdv' ? '📅' : '🎯';

            html += `<div style="position:relative;display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);">
                <div style="position:absolute;left:-14px;width:12px;height:12px;border-radius:50%;background:${dotColor};border:2px solid #081a0e;margin-top:4px;flex-shrink:0;"></div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
                        <span style="font-size:14px;">${icon}</span>
                        ${ev.type==='rdv'
                            ? `<span style="font-size:13px;font-weight:600;color:#e8f5e9;">${ev.day} ${ev.time}</span>`
                            : `<span style="font-size:13px;font-weight:600;color:#e8f5e9;">${ev.text} ${STATUS_EMOJI[ev.status]||''}</span>`
                        }
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-size:10px;color:rgba(255,255,255,0.2);">${dateStr}</span>
                        ${ev.type==='rdv'
                            ? `<span style="font-size:9px;color:rgba(46,204,113,0.4);font-weight:600;">COURS</span>`
                            : `<span style="font-size:9px;color:${dotColor};font-weight:600;text-transform:uppercase;">${ev.status==='completed'?'ATTEINT':ev.status==='in-progress'?'EN COURS':'PAS ENTAMÉ'}</span><span style="font-size:9px;color:rgba(255,255,255,0.15);">· ${ev.author==='stef'?'Fixé par Stef':'Fixé par moi'}</span>`
                        }
                    </div>
                </div>
            </div>`;
        });

        html += '</div>';
        container.innerHTML = html;
    } catch(e) { container.innerHTML = '<div class="no-items">Erreur de chargement</div>'; }
}

async function renderParticipation() {
    const container = document.getElementById('participation-list');
    // Pour l'instant, afficher les réservations de cours comme participation
    // + les activités d'ateliers sauvegardées
    try {
        const [bookSnap, actSnap] = await Promise.all([
            db.collection('bookings').where('userId','==',currentUser.uid).orderBy('createdAt','desc').get(),
            db.collection('activities').where('userId','==',currentUser.uid).get().catch(()=>({docs:[]}))
        ]);

        let html = '';

        // Cours réservés
        if (!bookSnap.empty) {
            bookSnap.forEach(doc => {
                const b = doc.data();
                const dayC = (b.day||'').charAt(0).toUpperCase()+(b.day||'').slice(1);
                html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,0.15);border-radius:10px;">
                    <span style="font-size:18px;">📐</span>
                    <div style="flex:1;">
                        <div style="font-size:13px;font-weight:600;color:#e8f5e9;">Cours de maths</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.3);">${dayC} ${b.time} — sem. du ${b.weekStart||''}</div>
                    </div>
                </div>`;
            });
        }

        // Ateliers complétés (activités sauvegardées)
        const ATELIER_NAMES = {
            'cerveau': { icon:'🧠', name:"Ton cerveau, c'est un super pouvoir", res:'Fiches neurosciences' },
            'organisation': { icon:'📋', name:'Organise tes idées', res:'Templates de fiches' },
            'planification': { icon:'📅', name:'Time management ninja', res:'Modèle de planning' },
            'synthese': { icon:'📝', name:'Notes de ouf', res:'Guide prise de notes' },
            'memorisation': { icon:'🏋️', name:'Mémo warrior', res:'Flashcards et techniques' },
            'consignes': { icon:'📖', name:'Focus mode : ON', res:'Checklist concentration' },
        };

        const actDocs = actSnap.docs || [];
        actDocs.forEach(doc => {
            const d = doc.data();
            const atelier = d.atelier || '';
            const info = ATELIER_NAMES[atelier] || { icon:'🎓', name:'Atelier '+atelier, res:'Ressources' };
            html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(46,204,113,0.04);border:1px solid rgba(46,204,113,0.1);border-radius:10px;">
                <span style="font-size:18px;">${info.icon}</span>
                <div style="flex:1;">
                    <div style="font-size:13px;font-weight:600;color:#e8f5e9;">${info.name}</div>
                    <div style="font-size:11px;color:rgba(46,204,113,0.4);">Atelier complété ✓</div>
                </div>
                <button onclick="alert('Ressources : ${info.res} — disponibles bientôt !')" style="background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);border-radius:8px;padding:6px 10px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700;color:rgba(46,204,113,0.7);cursor:pointer;">
                    📂 Ressources
                </button>
            </div>`;
        });

        if (!html) {
            container.innerHTML = '<div class="no-items">Aucun cours ou atelier pour le moment.</div>';
        } else {
            container.innerHTML = html;
        }
    } catch(e) {
        container.innerHTML = '<div class="no-items">Erreur de chargement</div>';
    }
}

function renderBadgesSummary(p) {
    const container = document.getElementById('badges-summary');
    const userBadges = p.badges || [];
    if (userBadges.length === 0) {
        container.innerHTML = '<span style="font-size:12px;color:rgba(255,255,255,0.2);">Aucun succès — continue à t\'entraîner !</span>';
        return;
    }
    let html = '';
    for (const id of userBadges) {
        const badge = ALL_BADGES.find(b => b.id === id);
        if (!badge) continue;
        html += `<span title="${badge.name}: ${badge.desc}">${badge.emoji}</span>`;
    }
    container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  PROFIL D'APPRENTISSAGE VISUEL
// ═══════════════════════════════════════════════════════════
function renderMindmap(p) {
    const container = document.getElementById('mindmap-container');
    const lp = p.learningProfile;

    if (!lp) {
        container.innerHTML = '<div class="no-items">Profil non renseigné — <a href="profil-edit.html" style="color:#2ecc71;">Compléter maintenant</a></div>';
        return;
    }

    const anneeLabels2 = {'1':'1ère','2':'2ème','3':'3ème','4':'4ème','5':'5ème','6':'6ème'};

    function chipRow(items, bg, color, border) {
        if (!items || items.length === 0) return '<span style="color:rgba(255,255,255,0.2);font-size:12px;">—</span>';
        return items.map(i =>
            `<span style="display:inline-block;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;background:${bg};color:${color};border:1px solid ${border};margin:3px;">${i}</span>`
        ).join('');
    }

    let html = '<div style="display:flex;flex-direction:column;gap:0;">';

    // Année
    html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <span style="font-size:24px;">📅</span>
        <div>
            <div style="font-size:10px;color:rgba(255,255,255,0.3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Année scolaire</div>
            <div style="font-size:20px;font-weight:800;color:#2ecc71;">${anneeLabels2[lp.annee]||lp.annee||'?'} année</div>
        </div>
    </div>`;

    // Troubles
    if (lp.troubles && lp.troubles.length > 0) {
        html += `<div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="font-size:10px;color:rgba(243,156,18,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">⚠️ Troubles d'apprentissage</div>
            <div style="display:flex;flex-wrap:wrap;gap:0;">${chipRow(lp.troubles,'rgba(243,156,18,0.1)','#f39c12','rgba(243,156,18,0.2)')}</div>
        </div>`;
    }

    // Points forts
    html += `<div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <div style="font-size:10px;color:rgba(46,204,113,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">💪 Mes points forts</div>
        <div style="display:flex;flex-wrap:wrap;gap:0;">${chipRow(lp.pointsForts||[],'rgba(46,204,113,0.1)','#2ecc71','rgba(46,204,113,0.2)')}</div>
        ${lp.pointsFortsCoursDetail ? `<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:6px;">📚 Cours : ${lp.pointsFortsCoursDetail}</div>` : ''}
    </div>`;

    // À travailler
    html += `<div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <div style="font-size:10px;color:rgba(231,76,60,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">🔧 À travailler</div>
        <div style="display:flex;flex-wrap:wrap;gap:0;">${chipRow(lp.pointsFaibles||[],'rgba(231,76,60,0.08)','#e74c3c','rgba(231,76,60,0.2)')}</div>
        ${lp.pointsFaiblesCoursDetail ? `<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:6px;">📚 Cours : ${lp.pointsFaiblesCoursDetail}</div>` : ''}
    </div>`;

    // Suivis extérieurs
    if (lp.suivisExt && lp.suivisExt.length > 0 && !lp.suivisExt.includes('Aucun')) {
        html += `<div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="font-size:10px;color:rgba(52,152,219,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">🩺 Suivis extérieurs</div>
            <div style="display:flex;flex-wrap:wrap;gap:0;">${chipRow(lp.suivisExt,'rgba(52,152,219,0.08)','#3498db','rgba(52,152,219,0.2)')}</div>
        </div>`;
    }

    // Aides
    if (lp.aides) {
        html += `<div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="font-size:10px;color:rgba(155,89,182,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">✅ Ce qui m'aide</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.5;">${lp.aides}</div>
        </div>`;
    }

    // Notes
    if (lp.notes) {
        html += `<div style="padding:12px 14px;">
            <div style="font-size:10px;color:rgba(255,255,255,0.3);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">📝 Notes</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5;font-style:italic;">${lp.notes}</div>
        </div>`;
    }

    html += '</div>';
    container.innerHTML = html;
    return; // skip old SVG code below

    const W = 700;
    const H = 500;
    const cx = W / 2;
    const cy = H / 2;

    const anneeLabels = {'1':'1ère','2':'2ème','3':'3ème','4':'4ème','5':'5ème','6':'6ème'};
    const prenom = p.name || 'Moi';

    // Branches de la carte mentale
    const branches = [];

    // 1. Année
    branches.push({
        label: '📅 ' + (anneeLabels[lp.annee] || lp.annee || '?') + ' année',
        items: [],
        angle: -90, dist: 130, color: '#2ecc71'
    });

    // 2. Points forts
    branches.push({
        label: '💪 Points forts',
        items: lp.pointsForts || lp.easySubjects || [],
        detail: lp.pointsFortsCoursDetail || '',
        angle: -35, dist: 160, color: '#2ecc71'
    });

    // 3. À travailler
    branches.push({
        label: '🔧 À travailler',
        items: lp.pointsFaibles || lp.hardSubjects || [],
        detail: lp.pointsFaiblesCoursDetail || '',
        angle: 35, dist: 160, color: '#e74c3c'
    });

    // 4. Troubles
    if (lp.troubles && lp.troubles.length > 0) {
        branches.push({
            label: '⚠️ Troubles',
            items: lp.troubles,
            angle: 90, dist: 130, color: '#f39c12'
        });
    }

    // 5. Suivis
    if (lp.suivisExt && lp.suivisExt.length > 0 && !lp.suivisExt.includes('Aucun')) {
        branches.push({
            label: '🩺 Suivis',
            items: lp.suivisExt,
            angle: 145, dist: 150, color: '#3498db'
        });
    }

    // 6. Aides
    if (lp.aides) {
        branches.push({
            label: '✅ Aides',
            items: [lp.aides],
            angle: -145, dist: 150, color: '#9b59b6'
        });
    }

    // 7. Notes
    if (lp.notes) {
        branches.push({
            label: '📝 Notes',
            items: [lp.notes],
            angle: 180, dist: 120, color: '#7f8c8d'
        });
    }

    // Générer le SVG
    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="mindmap-svg" style="font-family:'Caveat',cursive;">`;

    // Fond papier
    svg += `<rect width="${W}" height="${H}" fill="rgba(0,0,0,0.15)" rx="12"/>`;

    // Lignes de fond (style carnet)
    for (let y = 40; y < H; y += 28) {
        svg += `<line x1="30" y1="${y}" x2="${W-30}" y2="${y}" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>`;
    }

    // Cercle central
    svg += `<circle cx="${cx}" cy="${cy}" r="42" fill="rgba(46,204,113,0.1)" stroke="rgba(46,204,113,0.3)" stroke-width="2"/>`;
    svg += `<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="700">${prenom}</text>`;
    svg += `<text x="${cx}" y="${cy+14}" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12">Mon profil</text>`;

    // Dessiner les branches
    branches.forEach((branch, idx) => {
        const rad = branch.angle * Math.PI / 180;
        const bx = cx + Math.cos(rad) * branch.dist;
        const by = cy + Math.sin(rad) * branch.dist;

        // Ligne ondulée (courbe de Bézier pour effet dessiné)
        const mx = (cx + bx) / 2 + (Math.random() - 0.5) * 20;
        const my = (cy + by) / 2 + (Math.random() - 0.5) * 20;
        svg += `<path d="M ${cx} ${cy} Q ${mx} ${my} ${bx} ${by}" fill="none" stroke="${branch.color}" stroke-width="2.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="6 4"/>`;

        // Bulle du label
        const labelW = branch.label.length * 8 + 24;
        svg += `<rect x="${bx - labelW/2}" y="${by - 16}" width="${labelW}" height="28" rx="14" fill="${branch.color}" opacity="0.15" stroke="${branch.color}" stroke-width="1.5" opacity="0.3"/>`;
        svg += `<text x="${bx}" y="${by + 4}" text-anchor="middle" fill="${branch.color}" font-size="14" font-weight="700">${branch.label}</text>`;

        // Sous-items
        if (branch.items && branch.items.length > 0) {
            branch.items.forEach((item, j) => {
                const subAngle = rad + (j - (branch.items.length - 1) / 2) * 0.35;
                const subDist = 55 + j * 8;
                const sx = bx + Math.cos(subAngle) * subDist;
                const sy = by + Math.sin(subAngle) * subDist;

                // Petite ligne
                svg += `<line x1="${bx}" y1="${by + 12}" x2="${sx}" y2="${sy}" stroke="${branch.color}" stroke-width="1" opacity="0.25" stroke-dasharray="3 3"/>`;

                // Texte
                const truncated = item.length > 22 ? item.slice(0, 20) + '…' : item;
                svg += `<text x="${sx}" y="${sy + 4}" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">${truncated}</text>`;
            });
        }

        // Détail cours
        if (branch.detail) {
            const dy = by + 12 + (branch.items ? branch.items.length * 8 + 30 : 25);
            svg += `<text x="${bx}" y="${dy}" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-style="italic">Cours: ${branch.detail}</text>`;
        }
    });

    // Petits dessins décoratifs (style sketchnote)
    svg += `<text x="35" y="30" fill="rgba(255,255,255,0.06)" font-size="22">✏️</text>`;
    svg += `<text x="${W-50}" y="30" fill="rgba(255,255,255,0.06)" font-size="22">📖</text>`;
    svg += `<text x="35" y="${H-15}" fill="rgba(255,255,255,0.06)" font-size="22">💡</text>`;
    svg += `<text x="${W-50}" y="${H-15}" fill="rgba(255,255,255,0.06)" font-size="22">🎯</text>`;

    // Petites étoiles décoratives
    [{ x: 80, y: 90 }, { x: W-90, y: 120 }, { x: 120, y: H-70 }, { x: W-110, y: H-90 }].forEach(p => {
        svg += `<text x="${p.x}" y="${p.y}" fill="rgba(255,255,255,0.04)" font-size="16">✦</text>`;
    });

    svg += '</svg>';
    container.innerHTML = svg;
}
</script>

</body>
</html>
