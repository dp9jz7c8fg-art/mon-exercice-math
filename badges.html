<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Succès – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #040804 0%, #061008 25%, #081a0e 50%, #0a2414 75%, #040804 100%);
            background-size: 400% 400%;
            animation: grad 20s ease infinite;
            color: #f0f0f8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes grad {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content {
            width: 100%;
            max-width: 600px;
            padding: 20px 14px 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.15s;
        }

        .nav a:hover { color: #f0f0f8; }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #2ecc71, #a8f0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-summary {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }

        .progress-summary strong {
            color: #2ecc71;
            font-size: 22px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 10px;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .badge-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .badge-card.unlocked {
            background: rgba(46,204,113,0.06);
            border-color: rgba(46,204,113,0.25);
        }

        .badge-card.unlocked::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.04), transparent 50%);
            pointer-events: none;
        }

        .badge-card.locked {
            opacity: 0.4;
        }

        .badge-emoji {
            font-size: 40px;
            transition: transform 0.2s;
        }

        .badge-card.unlocked:hover .badge-emoji { transform: scale(1.2); }

        .badge-card.locked .badge-emoji {
            filter: grayscale(1);
        }

        .badge-name {
            font-size: 14px;
            font-weight: 700;
            color: #f0f0f8;
        }

        .badge-card.locked .badge-name { color: rgba(255,255,255,0.4); }

        .badge-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            line-height: 1.4;
        }

        .badge-check {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
        }

        .badge-lock {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            opacity: 0.4;
        }

        #loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 420px) {
            .badge-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 22px; }
        }
    
        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid { grid-template-columns: 1fr !important; }
            .grid-2 { gap: 12px !important; }
            .space-card { padding: 22px 16px !important; }
            .space-icon { width: 60px !important; height: 60px !important; font-size: 36px !important; }
            .space-title { font-size: 17px !important; }
            .space-desc { font-size: 11px !important; }
            .card { padding: 18px 14px !important; gap: 10px !important; }
            .card-icon { width: 50px !important; height: 50px !important; font-size: 28px !important; }
            .card-title { font-size: 14px !important; }
            .card-desc { font-size: 11px !important; }
            .p-card { padding: 18px 12px !important; }
            .p-card-icon { width: 48px !important; height: 48px !important; font-size: 28px !important; }
            .eleve-profile { padding: 10px 14px !important; gap: 10px !important; }
            .ep-avatar { width: 44px !important; height: 44px !important; font-size: 28px !important; }
            .ep-name { font-size: 14px !important; }
            .section { padding: 16px 14px !important; }
            .section-title { font-size: 13px !important; }
            .welcome-title, .page-title { font-size: 20px !important; }
            .logo-wrap { padding: 10px 24px !important; }
            .logo-wrap img { max-height: 48px !important; }
            #breadcrumb { font-size: 10px !important; padding: 6px 12px !important; }
            body { padding-top: 32px !important; }
            .stats-row { gap: 6px !important; }
            .stat-box { padding: 10px 8px !important; }
            .stat-val { font-size: 20px !important; }
            .stat-label { font-size: 8px !important; }
            .btn-save, .btn-submit, .id-btn, .add-btn { padding: 14px !important; font-size: 14px !important; }
            .avis-wrap { height: 44px !important; }
            .avis-text { font-size: 11px !important; }
            .social-row { gap: 12px !important; }
            .social-link { width: 40px !important; height: 40px !important; }
            .footer { font-size: 8px !important; }
            .stef-inline { width: 32px !important; height: 32px !important; font-size: 18px !important; }
            .agenda-btn { width: 40px !important; height: 40px !important; font-size: 18px !important; }
            .tab { padding: 6px 10px !important; font-size: 10px !important; }
            .ans-input { width: 100% !important; font-size: 16px !important; }
            .expr-display { font-size: 16px !important; padding: 12px !important; }
            .qcm-grid { grid-template-columns: 1fr !important; }
            .qcm-btn { padding: 12px !important; font-size: 14px !important; }
            .profile-card { padding: 20px 16px !important; }
            .avatar-big { width: 80px !important; height: 80px !important; font-size: 48px !important; }
            .profile-name { font-size: 20px !important; }
            .mindmap-svg { height: auto !important; }
            .content { padding-left: 12px !important; padding-right: 12px !important; }
            .id-box { padding: 20px 16px !important; }
            .role-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
            .role-btn { padding: 12px 10px !important; font-size: 13px !important; }
            .role-icon { width: 34px !important; height: 34px !important; font-size: 20px !important; }
            .add-row { flex-direction: column !important; }
            .add-btn { width: 100% !important; }
            .obj-card { padding: 10px 12px !important; }
            .section-dashed { padding: 16px 14px !important; }
        }
        
</style>
</head>
<body>

<div class="content">

    <h1 class="page-title">🏆 Mes Succès</h1>

    <div id="loading-screen">
        <div class="spinner"></div>
        <span>Chargement…</span>
    </div>

    <div id="badges-content" style="display:none;">
        <div class="progress-summary" id="progress-summary"></div>

        <div class="section-label">🌱 Premiers pas</div>
        <div class="badge-grid" id="grid-premiers"></div>

        <div class="section-label">📊 Volume</div>
        <div class="badge-grid" id="grid-volume"></div>

        <div class="section-label">⭐ Précision</div>
        <div class="badge-grid" id="grid-precision"></div>

        <div class="section-label">📐 Angles</div>
        <div class="badge-grid" id="grid-angles"></div>

        <div class="section-label">🍕 Fractions</div>
        <div class="badge-grid" id="grid-fractions"></div>

        <div class="section-label">🎓 Perfection</div>
        <div class="badge-grid" id="grid-perfection"></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script src="badges-system.js"></script>
<script src="theme.js"></script>
<script src="breadcrumb.js"></script>

<script>
const CATEGORIES = {
    'premiers':   ['first_step', 'first_correct', 'five_correct'],
    'volume':     ['ten_ex', 'twenty_five_ex', 'fifty_ex', 'hundred_ex', 'two_hundred_ex', 'five_hundred_ex'],
    'precision':  ['ten_correct', 'fifty_correct', 'hundred_correct'],
    'angles':     ['angle_first', 'angle_ten', 'angle_master'],
    'fractions':  ['frac_first', 'frac_comparer', 'frac_simplifier', 'frac_convertir', 'frac_arrondir', 'frac_addsub', 'frac_multiplier', 'frac_diviser', 'frac_all_ten'],
    'perfection': ['perfectionist'],
};

requireAuth((user, profile) => {
    injectUserBar(user, profile);
    document.getElementById('loading-screen').style.display = 'none';
    const content = document.getElementById('badges-content');
    content.style.display = 'flex';
    content.style.flexDirection = 'column';
    content.style.gap = '16px';

    const userBadges = profile.badges || [];
    const totalBadges = ALL_BADGES.length;
    const unlockedCount = userBadges.length;

    document.getElementById('progress-summary').innerHTML =
        `<strong>${unlockedCount}</strong> / ${totalBadges} succès débloqués`;

    for (const [cat, ids] of Object.entries(CATEGORIES)) {
        const grid = document.getElementById('grid-' + cat);
        grid.innerHTML = '';
        ids.forEach(id => {
            const badge = ALL_BADGES.find(b => b.id === id);
            if (!badge) return;
            const unlocked = userBadges.includes(id);
            grid.innerHTML += `
                <div class="badge-card ${unlocked ? 'unlocked' : 'locked'}">
                    ${unlocked ? '<span class="badge-check">✅</span>' : '<span class="badge-lock">🔒</span>'}
                    <span class="badge-emoji">${badge.emoji}</span>
                    <span class="badge-name">${badge.name}</span>
                    <span class="badge-desc">${badge.desc}</span>
                </div>`;
        });
    }
});
</script>
