<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURO-HACK : Le Jeu</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
#game-container { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 600px; width: 100%; text-align: center; border: 1px solid #10b981; animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
#hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 12px; color: #94a3b8; }
#progress-track { flex: 1; height: 6px; background: #334155; border-radius: 999px; margin: 0 14px; overflow: hidden; }
#progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.4s ease; }
.defi-icon { font-size: 40px; margin-bottom: 6px; }
h2 { color: #10b981; margin: 6px 0 12px; }
p.scene-text { color: #cbd5e1; line-height: 1.5; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #334155; border: none; border-radius: 10px; color: white; cursor: pointer; transition: 0.2s; font-size: 15px; text-align: left; }
.btn:hover { background: #10b981; color: #020617; }
#feedback-box { display: none; margin-top: 16px; padding: 14px; border-radius: 12px; background: rgba(16,185,129,0.1); border: 1px solid #10b981; text-align: left; font-size: 14px; line-height: 1.5; align-items: flex-start; gap: 12px; }
#feedback-box.show { display: flex; animation: fadeIn 0.3s ease-out; }
#stef-avatar { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid #10b981; }
#stef-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
#feedback-text { flex: 1; }
#continue-btn { margin-top: 14px; background: #10b981; color: #020617; font-weight: 700; }
#continue-btn:hover { background: #0d9668; color: white; }
.profile-card { background: rgba(16,185,129,0.08); border: 1px solid #10b981; border-radius: 14px; padding: 20px; margin-top: 16px; }
.profile-title { font-size: 22px; font-weight: 800; color: #10b981; margin-bottom: 8px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { text-align: center; }
#commitment-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-family: inherit; font-size: 14px; min-height: 70px; resize: vertical; margin-top: 10px; }
</style>
</head>
<body>
<div id="game-container">
<div id="scene">
<h2>Bienvenue Recrue...</h2>
<p class="scene-text">Es-tu prêt à hacker ton cerveau pour réussir tes études ? On commence par un petit quiz sur les idées reçues, puis 4 défis t'attendent.</p>
<button class="btn" id="start-btn">🧪 Commencer par le quiz</button>
</div>
</div>

<script>
const scenes = {
  scene1: {
    title: "DÉFI 1 : Le Code",
    icon: "🧠",
    text: "Un carnet affiche le code 8-3-1-9-4-2 et disparaît. Que fais-tu ?",
    options: [
      { text: "Je répète 831-942 en boucle", feedback: "Bon réflexe pour tenir quelques secondes : c'est la boucle phonologique. Pour que ça reste plus longtemps, essaie d'ajouter un petit effort de rappel un peu plus tard, sans regarder.", type: "strategist" },
      { text: "Je ferme les yeux pour « voir » le carnet", feedback: "L'image mentale est une bonne stratégie visuelle. Pour la rendre encore plus solide, essaie de la combiner avec un essai de rappel sans regarder.", type: "strategist" },
      { text: "J'essaie de retrouver les chiffres par pur effort", feedback: "Tu viens d'utiliser l'effort de récupération : se forcer à retrouver une info dans sa tête est l'une des façons les plus efficaces de la faire tenir dans la mémoire.", type: "strategist" }
    ],
    next: "scene2"
  },
  scene2: {
    title: "DÉFI 2 : Le Couloir",
    icon: "🎯",
    text: "Des notifications vibrent partout. Ton attention se fragmente...",
    options: [
      { text: "Je gère les deux en même temps (multitâche)", feedback: "C'est tentant de vouloir tout gérer en même temps. En réalité, le cerveau ne fait pas deux choses à la fois : il bascule sans cesse de l'une à l'autre, ce qui coûte de l'énergie et du temps.", type: "optimizer" },
      { text: "Je range mon téléphone dans une autre pièce", feedback: "Couper les distractions avant de commencer demande moins de volonté que d'y résister sans arrêt : contrôler son environnement est une vraie stratégie.", type: "optimizer" }
    ],
    next: "scene3"
  },
  scene3: {
    title: "DÉFI 3 : Le Gardien",
    icon: "🛡️",
    text: "Demain c'est l'interro. Le Gardien du Savoir te bloque le passage : comment révises-tu ce soir ?",
    options: [
      { text: "Je relis mon cours plusieurs fois", feedback: "Relire donne un sentiment rassurant de familiarité. Pour vérifier si ça a vraiment tenu, essaie d'y ajouter un petit autotest sans regarder tes notes.", type: "strategist" },
      { text: "Je me teste sans regarder mes notes", feedback: "Se tester soi-même sans regarder ses notes (l'autotest actif) est l'une des méthodes de révision les plus efficaces qui soient.", type: "strategist" },
      { text: "Je surligne tout en couleurs", feedback: "Surligner aide à repérer l'essentiel d'un coup d'œil. Pour vraiment le retenir, essaie ensuite de reformuler ou de te tester sur ce que tu as surligné.", type: "strategist" }
    ],
    next: "scene4"
  },
  scene4: {
    title: "DÉFI 4 : La Nuit Blanche",
    icon: "🌙",
    text: "Il est 23h, tu n'as pas fini de réviser et l'examen est à 8h. Que choisis-tu ?",
    options: [
      { text: "Je révise toute la nuit, café à volonté", feedback: "Quand le temps manque, ça semble logique de grappiller des heures sur la nuit. Sache juste que le cerveau a besoin de sommeil pour ranger et consolider ce qu'il vient d'apprendre.", type: "optimizer" },
      { text: "Je dors 8h, quitte à réviser un peu moins", feedback: "Dormir suffisamment fait aussi partie de la révision : c'est pendant le sommeil que ton cerveau consolide ce que tu as appris dans la journée.", type: "optimizer" }
    ],
    next: "final"
  }
};

const QUIZ = [
  { statement: "On n'utilise que 10 % de notre cerveau.", answer: false, explain: "C'est un mythe très répandu : l'imagerie cérébrale montre que la quasi-totalité du cerveau est active, même au repos." },
  { statement: "On apprend mieux si les cours sont adaptés à notre « style d'apprentissage » (visuel, auditif, kinesthésique).", answer: false, explain: "L'idée est populaire, mais les études sérieuses n'ont jamais montré qu'adapter l'enseignement au style préféré améliore vraiment l'apprentissage." },
  { statement: "Le cerveau peut faire plusieurs choses à la fois sans perdre en efficacité.", answer: false, explain: "Le cerveau alterne en réalité entre les tâches au lieu de les faire en parallèle, ce qui coûte du temps et de l'attention." },
  { statement: "Relire plusieurs fois ses notes est l'une des meilleures façons de les mémoriser.", answer: false, explain: "Se tester soi-même est nettement plus efficace que la simple relecture, même si celle-ci donne une impression rassurante de familiarité." },
  { statement: "Le cerveau continue à créer de nouvelles connexions tout au long de la vie.", answer: true, explain: "C'est vrai, on appelle ça la plasticité cérébrale — une bonne nouvelle : on peut progresser à tout âge !" }
];

const CHALLENGES = {
  strategist: [
    "Cette semaine, je me teste sur un chapitre au lieu de le relire.",
    "Je refais un exercice sans regarder la correction avant d'avoir vraiment cherché.",
    "J'explique un chapitre à voix haute, comme si j'apprenais à quelqu'un d'autre."
  ],
  optimizer: [
    "Cette semaine, je range mon téléphone dans une autre pièce pendant mes devoirs.",
    "Je me couche à une heure fixe la veille de chaque interro.",
    "Je prépare mon espace de travail avant de commencer à réviser."
  ]
};

const TOTAL_DEFIS = 4;
let typeCounts = { strategist: 0, optimizer: 0 };
let choicesMade = [];

document.getElementById('start-btn').addEventListener('click', () => renderQuiz(0));

function sceneIndex(id) {
  return { scene1: 1, scene2: 2, scene3: 3, scene4: 4 }[id] || 0;
}

function renderQuiz(index) {
  const container = document.getElementById('game-container');

  if (index >= QUIZ.length) {
    nextScene('scene1');
    return;
  }

  const q = QUIZ[index];
  container.innerHTML = `
    <div id="hud">
      <span>Quiz ${index + 1}/${QUIZ.length}</span>
      <div id="progress-track"><div id="progress-bar"></div></div>
    </div>
    <div class="defi-icon">🔎</div>
    <h2>Vrai ou Mythe ?</h2>
    <p class="scene-text">${q.statement}</p>
    <div class="btn-row">
      <button class="btn" id="quiz-true">✅ Vrai</button>
      <button class="btn" id="quiz-false">❌ Mythe</button>
    </div>
    <div id="feedback-box"></div>`;

  document.getElementById('progress-bar').style.width = (index / QUIZ.length * 100) + '%';
  document.getElementById('quiz-true').addEventListener('click', () => chooseQuizAnswer(index, true));
  document.getElementById('quiz-false').addEventListener('click', () => chooseQuizAnswer(index, false));
}

function chooseQuizAnswer(index, guess) {
  const q = QUIZ[index];
  const correct = guess === q.answer;

  document.getElementById('quiz-true').disabled = true;
  document.getElementById('quiz-false').disabled = true;

  const box = document.getElementById('feedback-box');
  box.innerHTML = `
    <div id="stef-avatar"><img src="Stef.png" alt="Stef" onerror="this.parentNode.textContent='🧑‍🏫'"></div>
    <div id="feedback-text">
      <p style="margin:0 0 12px;"><b>${correct ? '✅ Exact !' : '💡 Pas tout à fait.'}</b> ${q.explain}</p>
      <button class="btn" id="continue-btn">Continuer →</button>
    </div>`;
  box.classList.add('show');
  document.getElementById('continue-btn').addEventListener('click', () => renderQuiz(index + 1));
}

function nextScene(id) {
  const container = document.getElementById('game-container');

  if (id === 'final') {
    const isTie = typeCounts.strategist === typeCounts.optimizer;
    const leadType = isTie ? null : (typeCounts.strategist > typeCounts.optimizer ? 'strategist' : 'optimizer');
    const profile = isTie
      ? { title: "🧠 HACKER COMPLET", text: "Tu combines l'effort actif ET l'hygiène de vie. C'est exactement le combo gagnant pour apprendre efficacement !" }
      : leadType === 'strategist'
        ? { title: "🎯 STRATEGIST", text: "Tu apprends par l'effort actif : tester, récupérer, s'entraîner. Continue à te tester plutôt qu'à relire !" }
        : { title: "⚡ OPTIMIZER", text: "Tu sais que le corps et l'environnement comptent autant que la volonté. Protège ton sommeil et ton espace de travail !" };

    const recap = choicesMade.map((c) => `<li><b>${c.defi}</b> — ${c.text}</li>`).join('');
    const challengeOptions = isTie
      ? [...CHALLENGES.strategist.slice(0, 2), ...CHALLENGES.optimizer.slice(0, 2)]
      : CHALLENGES[leadType];

    container.innerHTML = `
      <div class="defi-icon">🏆</div>
      <h2>Mission Accomplie !</h2>
      <p class="scene-text">Voici tes choix sur les 4 défis :</p>
      <ul class="scene-text" style="text-align:left;padding-left:20px;">${recap}</ul>
      <div class="profile-card">
        <div class="profile-title">${profile.title}</div>
        <p class="scene-text">${profile.text}</p>
      </div>
      <div class="profile-card" id="commitment-card">
        <div class="profile-title" style="font-size:16px;">🎯 Ton défi de la semaine</div>
        <p class="scene-text">D'après ton profil, voici des défis qui pourraient te correspondre. Choisis celui que tu veux essayer :</p>
        <div id="challenge-options"></div>
        <button class="btn" id="own-challenge-btn">✍️ Écrire mon propre défi</button>
      </div>
      <button class="btn" id="restart-btn">🔄 Recommencer</button>`;
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());

    const optionsEl = document.getElementById('challenge-options');
    challengeOptions.forEach((text) => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = text;
      btn.addEventListener('click', () => confirmCommitment(text));
      optionsEl.appendChild(btn);
    });

    document.getElementById('own-challenge-btn').addEventListener('click', () => {
      optionsEl.insertAdjacentHTML('afterend', `
        <textarea id="commitment-input" placeholder="Ex : Je vais me tester sur mon cours au lieu de le relire..."></textarea>
        <button class="btn" id="commit-btn">Je m'engage 💪</button>`);
      document.getElementById('own-challenge-btn').remove();
      document.getElementById('commit-btn').addEventListener('click', () => {
        const text = document.getElementById('commitment-input').value.trim();
        if (!text) return;
        confirmCommitment(text);
      });
    });
    return;
  }

  const s = scenes[id];
  container.innerHTML = `
    <div id="hud">
      <span>Défi ${sceneIndex(id)}/${TOTAL_DEFIS}</span>
      <div id="progress-track"><div id="progress-bar"></div></div>
    </div>
    <div class="defi-icon">${s.icon}</div>
    <h2>${s.title}</h2>
    <p class="scene-text">${s.text}</p>
    <div id="options"></div>
    <div id="feedback-box"></div>`;

  document.getElementById('progress-bar').style.width = ((sceneIndex(id) - 1) / TOTAL_DEFIS * 100) + '%';

  const optionsEl = document.getElementById('options');
  s.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => chooseOption(s, i));
    optionsEl.appendChild(btn);
  });
}

function chooseOption(scene, index) {
  const opt = scene.options[index];
  if (opt.type) typeCounts[opt.type]++;
  choicesMade.push({ defi: scene.title.replace(/^DÉFI \d+ : /, ''), text: opt.text });

  document.getElementById('options').querySelectorAll('.btn').forEach((b) => (b.disabled = true));

  const box = document.getElementById('feedback-box');
  box.innerHTML = `
    <div id="stef-avatar"><img src="Stef.png" alt="Stef" onerror="this.parentNode.textContent='🧑‍🏫'"></div>
    <div id="feedback-text">
      <p style="margin:0 0 12px;">${opt.feedback}</p>
      <button class="btn" id="continue-btn">Continuer →</button>
    </div>`;
  box.classList.add('show');
  document.getElementById('continue-btn').addEventListener('click', () => nextScene(scene.next));
}

function confirmCommitment(text) {
  const card = document.getElementById('commitment-card');
  card.innerHTML = `
    <div class="profile-title" style="font-size:16px;">🎯 Ton défi de la semaine</div>
    <p class="scene-text" id="commitment-echo"></p>
    <p class="scene-text" style="color:#10b981;margin-top:8px;">C'est noté ! Reviens sur cette page quand tu veux pour te rappeler ton engagement.</p>`;
  document.getElementById('commitment-echo').textContent = `« ${text} »`;
}
</script>
</body>
</html>
