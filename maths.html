<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathématiques – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#040804 0%,#061008 25%,#081a0e 50%,#0a2414 75%,#040804 100%);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;justify-content:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .page{width:100%;max-width:660px;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:24px}
        .nav{width:100%;display:flex;justify-content:flex-start}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.15s}
        .nav a:hover{color:#2ecc71}
        .page-header{text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center}
        .page-icon{font-size:48px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:30px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-sub{font-size:12px;color:rgba(46,204,113,0.4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600}
        .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;width:100%}
        .card{background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:22px;padding:36px 20px;text-decoration:none;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s;backdrop-filter:blur(8px);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 30%,rgba(46,204,113,0.04),transparent 60%);pointer-events:none}
        .card:hover{transform:translateY(-5px);background:rgba(20,50,28,0.7);border-color:rgba(46,204,113,0.45);box-shadow:0 16px 50px rgba(0,0,0,0.35)}
        .card-icon{font-size:44px;width:76px;height:76px;display:flex;align-items:center;justify-content:center;border-radius:20px;background:rgba(46,204,113,0.1)}
        .card-title{font-size:18px;font-weight:700}
        .card-desc{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5}
        @media(max-width:520px){.grid-2{grid-template-columns:1fr}.page-title{font-size:24px}}
    </style>
</head>
<body>
<div class="page">
    <div class="nav"><a href="eleve.html">← Espace élève</a></div>
    <div class="page-header">
        <span class="page-icon">📐</span>
        <h1 class="page-title">Mathématiques</h1>
        <p class="page-sub">Choisis ton parcours</p>
    </div>
    <div class="grid-2">
        <a href="suivi.html" class="card">
            <div class="card-icon">📋</div>
            <div class="card-title">Suivi en présentiel</div>
            <div class="card-desc">Agenda, objectifs et questionnements pour tes séances en classe.</div>
        </a>
        <a href="exercices-en-ligne.html" class="card">
            <div class="card-icon">💻</div>
            <div class="card-title">Exercices en ligne</div>
            <div class="card-desc">Entraîne-toi sur les chapitres de ton année scolaire.</div>
        </a>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>requireAuth((u,p)=>{});</script>
</body>
</html>
