<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6ème primaire – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#040804,#061008,#081a0e,#0a2414,#040804);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .content{width:100%;max-width:600px;padding:20px 14px 60px;display:flex;flex-direction:column;gap:14px;align-items:center}
        .page-header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
        .page-icon{font-size:40px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
        .card{background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:16px;padding:18px 12px;text-decoration:none;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;transition:transform 0.2s,background 0.2s,border-color 0.2s;backdrop-filter:blur(8px)}
        .card:hover{transform:translateY(-3px);background:rgba(20,50,28,0.7);border-color:rgba(46,204,113,0.4)}
        .card.disabled{opacity:0.35;pointer-events:none}
        .card-icon{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(46,204,113,0.1)}
        .card-title{font-size:12px;font-weight:700;line-height:1.3}
        .badge{display:inline-flex;padding:2px 7px;border-radius:100px;font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
        .badge-ready{background:rgba(46,204,113,0.15);color:#2ecc71}
        .badge-soon{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.25)}
        @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="content">
    <div class="page-header">
        <span class="page-icon">6️⃣</span>
        <h1 class="page-title">6ème primaire</h1>
    </div>
    <div class="grid">
        <div class="card disabled"><div class="card-icon">➕</div><div class="card-title">Les 4 opérations</div><span class="badge badge-soon">Bientôt</span></div>
        <div class="card disabled"><div class="card-icon">½</div><div class="card-title">Fractions</div><span class="badge badge-soon">Bientôt</span></div>
        <div class="card disabled"><div class="card-icon">%</div><div class="card-title">Pourcentages</div><span class="badge badge-soon">Bientôt</span></div>
        <div class="card disabled"><div class="card-icon">📐</div><div class="card-title">Géométrie</div><span class="badge badge-soon">Bientôt</span></div>
        <div class="card disabled"><div class="card-icon">📏</div><div class="card-title">Mesures</div><span class="badge badge-soon">Bientôt</span></div>
        <div class="card disabled"><div class="card-icon">📊</div><div class="card-title">Données</div><span class="badge badge-soon">Bientôt</span></div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script src="theme.js"></script>
<script src="breadcrumb.js"></script>
<script>requireAuth((u,p)=>{});</script>
</body>
</html>
