<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi présentiel – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#040804 0%,#061008 25%,#081a0e 50%,#0a2414 75%,#040804 100%);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;justify-content:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .page{width:100%;max-width:700px;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:22px}
        .nav{width:100%;display:flex;justify-content:flex-start}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.15s}
        .nav a:hover{color:#2ecc71}
        .page-header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
        .page-icon{font-size:44px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%}
        .card{background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:20px;padding:28px 16px;text-decoration:none;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s;backdrop-filter:blur(8px);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 30%,rgba(46,204,113,0.03),transparent 60%);pointer-events:none}
        .card:hover{transform:translateY(-4px);background:rgba(20,50,28,0.7);border-color:rgba(46,204,113,0.4);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
        .card.disabled{opacity:0.4;pointer-events:none}
        .card-icon{font-size:36px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;border-radius:16px;background:rgba(46,204,113,0.1)}
        .card-title{font-size:15px;font-weight:700}
        .card-desc{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.4}
        .badge{display:inline-flex;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
        .badge-ready{background:rgba(46,204,113,0.15);color:#2ecc71}
        .badge-soon{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3)}
        @media(max-width:520px){.grid-3{grid-template-columns:1fr}.page-title{font-size:22px}}
    </style>
</head>
<body>
<div class="page">
    <div class="nav"><a href="maths.html">← Mathématiques</a></div>
    <div class="page-header">
        <span class="page-icon">📋</span>
        <h1 class="page-title">Suivi en présentiel</h1>
    </div>
    <div class="grid-3">
        <a href="agenda.html" class="card">
            <div class="card-icon">📅</div>
            <div class="card-title">Mon agenda</div>
            <div class="card-desc">Réserve tes prochains cours.</div>
            <span class="badge badge-ready">Disponible</span>
        </a>
        <div class="card disabled">
            <div class="card-icon">🎯</div>
            <div class="card-title">Mes objectifs</div>
            <div class="card-desc">Suis tes objectifs de progression.</div>
            <span class="badge badge-soon">Bientôt</span>
        </div>
        <div class="card disabled">
            <div class="card-icon">❓</div>
            <div class="card-title">Mes questionnements</div>
            <div class="card-desc">Note tes questions pour les séances.</div>
            <span class="badge badge-soon">Bientôt</span>
        </div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>requireAuth((u,p)=>{});</script>
</body>
</html>
