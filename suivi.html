<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi présentiel – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#040804,#061008,#081a0e,#0a2414,#040804);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .content{width:100%;max-width:580px;padding:20px 16px 60px;display:flex;flex-direction:column;gap:18px;align-items:center}

        /* Nav + agenda button */
        .top-bar{width:100%;display:flex;justify-content:space-between;align-items:center}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.15s}
        .nav a:hover{color:#2ecc71}
        .agenda-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2ecc71,#27ae60);border:none;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(46,204,113,0.3);transition:transform 0.2s,box-shadow 0.2s;text-decoration:none}
        .agenda-btn:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(46,204,113,0.45)}

        .page-header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
        .page-icon{font-size:40px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        /* ── Objectifs ── */
        .section{width:100%;background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:16px;padding:20px 18px;display:flex;flex-direction:column;gap:12px;backdrop-filter:blur(8px)}
        .section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
        .obj-list{display:flex;flex-direction:column;gap:8px}
        .obj-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:12px;background:rgba(0,0,0,0.2);transition:opacity 0.3s}
        .obj-card.achieved{opacity:0.3}
        .obj-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .obj-target{font-size:18px}
        .obj-status-btn{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
        .obj-status-btn.not-started{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.2)}
        .obj-status-btn.in-progress{border-color:#f39c12;background:rgba(243,156,18,0.1);color:#f39c12}
        .obj-status-btn.completed{border-color:#2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71}
        .obj-body{display:flex;flex-direction:column;gap:3px;flex:1}
        .obj-text{font-size:13px;color:#e8f5e9;line-height:1.5}
        .obj-card.achieved .obj-text{text-decoration:line-through;color:rgba(255,255,255,0.25)}
        .obj-meta{font-size:9px;color:rgba(255,255,255,0.2);display:flex;align-items:center;gap:6px}
        .obj-status-label{font-size:9px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
        .obj-status-label.not-started{color:rgba(255,255,255,0.25)}
        .obj-status-label.in-progress{color:#f39c12}
        .obj-status-label.completed{color:#2ecc71}

        .add-row{display:flex;gap:8px}
        .add-input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(40,100,55,0.25);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:#e8f5e9;outline:none}
        .add-input::placeholder{color:rgba(255,255,255,0.2)}
        .add-input:focus{border-color:rgba(46,204,113,0.4)}
        .add-btn{background:#2ecc71;color:#040804;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
        .add-btn:hover{opacity:0.85}

        /* ── Questionnements (encadré pointillé) ── */
        .section-dashed{width:100%;border:2px dashed rgba(46,204,113,0.45);border-radius:16px;padding:20px 18px;display:flex;flex-direction:column;gap:12px;background:rgba(16,42,24,0.5)}
        .q-list{display:flex;flex-direction:column;gap:6px}
        .q-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(20,50,30,0.4)}
        .q-icon{font-size:16px;flex-shrink:0}
        .q-text{font-size:13px;color:rgba(255,255,255,0.55);flex:1;line-height:1.4}
        .q-date{font-size:9px;color:rgba(255,255,255,0.15);flex-shrink:0}
        .q-del{background:none;border:none;color:rgba(255,255,255,0.12);font-size:14px;cursor:pointer;padding:4px;transition:color 0.15s}
        .q-del:hover{color:#e74c3c}
        .no-items{font-size:12px;color:rgba(255,255,255,0.2);text-align:center;padding:8px}

        .fb{font-size:11px;text-align:center;min-height:14px}
        .fb-ok{color:#2ecc71}.fb-err{color:#e74c3c}

        @media(max-width:480px){.page-title{font-size:20px}.agenda-btn{width:42px;height:42px;font-size:20px}}
    </style>
</head>
<body>

<div class="content">

    <!-- Top bar : nav + agenda -->
    <div class="top-bar">
        <div class="nav"><a href="maths.html">← Mathématiques</a></div>
        <a href="https://calendly.com/laclassedestef" target="_blank" class="agenda-btn" title="Mon agenda – Réserver un cours">📅</a>
    </div>

    <div class="page-header">
        <span class="page-icon">📋</span>
        <h1 class="page-title">Suivi en présentiel</h1>
    </div>

    <!-- OBJECTIFS -->
    <div class="section">
        <div class="section-title">🎯 Mes objectifs</div>
        <div class="obj-list" id="obj-list">
            <div class="no-items">Chargement…</div>
        </div>
        <div class="add-row">
            <input type="text" class="add-input" id="obj-input" placeholder="Ajouter un objectif…">
            <button class="add-btn" onclick="addObjectif()">Ajouter</button>
        </div>
        <div class="fb" id="obj-fb"></div>
    </div>

    <!-- QUESTIONNEMENTS (encadré pointillé) -->
    <div class="section-dashed">
        <div class="section-title">❓ Mes questionnements</div>
        <div class="q-list" id="q-list">
            <div class="no-items">Chargement…</div>
        </div>
        <div class="add-row">
            <input type="text" class="add-input" id="q-input" placeholder="Une question pour Stef…">
            <button class="add-btn" onclick="addQuestion()">Poser</button>
        </div>
        <div class="fb" id="q-fb"></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>
let currentUser = null;

const STATUS_CYCLE = ['not-started','in-progress','completed'];
const STATUS_ICONS = {'not-started':'○','in-progress':'◐','completed':'✓'};
const STATUS_LABELS = {'not-started':'Pas entamé','in-progress':'En cours','completed':'Atteint'};

document.getElementById('obj-input').addEventListener('keydown',e=>{if(e.key==='Enter')addObjectif()});
document.getElementById('q-input').addEventListener('keydown',e=>{if(e.key==='Enter')addQuestion()});

requireAuth((user, profile) => {
    currentUser = user;
    loadObjectifs();
    loadQuestions();
});

// ═══════════════════════════════════════════════════════════
//  OBJECTIFS
// ═══════════════════════════════════════════════════════════
async function loadObjectifs(){
    const list = document.getElementById('obj-list');
    try{
        const snap = await db.collection('objectifs')
            .where('userId','==',currentUser.uid)
            .orderBy('createdAt','desc').get();

        if(snap.empty){list.innerHTML='<div class="no-items">Aucun objectif pour le moment.</div>';return}

        const docs = [];
        snap.forEach(doc => docs.push({id:doc.id,...doc.data()}));
        docs.sort((a,b) => {
            if(a.status==='completed' && b.status!=='completed') return 1;
            if(a.status!=='completed' && b.status==='completed') return -1;
            return 0;
        });

        let html='';
        docs.forEach(obj => {
            const st = obj.status||'not-started';
            const isAchieved = st === 'completed';
            const date = obj.createdAt ? obj.createdAt.toDate().toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '';
            const author = obj.addedBy === 'eleve' ? 'Moi' : 'Stef';

            html += `
            <div class="obj-card ${isAchieved?'achieved':''}">
                <div class="obj-left">
                    <span class="obj-target">🎯</span>
                    <button class="obj-status-btn ${st}" onclick="cycleStatus('${obj.id}','${st}')" title="Cliquer pour changer le statut">
                        ${STATUS_ICONS[st]}
                    </button>
                </div>
                <div class="obj-body">
                    <div class="obj-text">${obj.text}</div>
                    <div class="obj-meta">
                        <span class="obj-status-label ${st}">${STATUS_LABELS[st]}</span>
                        <span>· ${author} · ${date}</span>
                    </div>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }catch(e){
        console.error(e);
        list.innerHTML='<div class="no-items">Erreur de chargement.</div>';
    }
}

async function addObjectif(){
    const input = document.getElementById('obj-input');
    const text = input.value.trim();
    const fb = document.getElementById('obj-fb');
    fb.textContent='';
    if(!text){fb.textContent='Écris un objectif.';fb.className='fb fb-err';return}

    try{
        await db.collection('objectifs').add({
            userId: currentUser.uid,
            text: text,
            status: 'not-started',
            addedBy: 'eleve',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value='';
        fb.textContent='✓ Objectif ajouté !';fb.className='fb fb-ok';
        setTimeout(()=>{fb.textContent=''},2000);
        loadObjectifs();
    }catch(e){fb.textContent='Erreur.';fb.className='fb fb-err'}
}

async function cycleStatus(docId, current){
    const idx = STATUS_CYCLE.indexOf(current);
    const next = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];
    try{
        await db.collection('objectifs').doc(docId).update({status:next});
        loadObjectifs();
    }catch(e){console.error(e)}
}

// ═══════════════════════════════════════════════════════════
//  QUESTIONNEMENTS
// ═══════════════════════════════════════════════════════════
async function loadQuestions(){
    const list = document.getElementById('q-list');
    try{
        const snap = await db.collection('questions')
            .where('userId','==',currentUser.uid)
            .orderBy('createdAt','desc').get();

        if(snap.empty){list.innerHTML='<div class="no-items">Aucune question pour le moment.</div>';return}

        let html='';
        snap.forEach(doc => {
            const q = doc.data();
            const date = q.createdAt ? q.createdAt.toDate().toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '';
            html += `
            <div class="q-card">
                <span class="q-icon">💬</span>
                <span class="q-text">${q.text}</span>
                <span class="q-date">${date}</span>
                <button class="q-del" onclick="deleteQuestion('${doc.id}')" title="Supprimer">✕</button>
            </div>`;
        });
        list.innerHTML = html;
    }catch(e){
        console.error(e);
        list.innerHTML='<div class="no-items">Erreur de chargement.</div>';
    }
}

async function addQuestion(){
    const input = document.getElementById('q-input');
    const text = input.value.trim();
    const fb = document.getElementById('q-fb');
    fb.textContent='';
    if(!text){fb.textContent='Écris ta question.';fb.className='fb fb-err';return}

    try{
        await db.collection('questions').add({
            userId: currentUser.uid,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value='';
        fb.textContent='✓ Question ajoutée !';fb.className='fb fb-ok';
        setTimeout(()=>{fb.textContent=''},2000);
        loadQuestions();
    }catch(e){fb.textContent='Erreur.';fb.className='fb fb-err'}
}

async function deleteQuestion(docId){
    try{
        await db.collection('questions').doc(docId).delete();
        loadQuestions();
    }catch(e){console.error(e)}
}
</script>
</body>
</html>
