<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau blanc – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#e8f5e9;display:flex;flex-direction:column;}
        .toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#111;border-bottom:1px solid rgba(46,204,113,0.15);flex-wrap:wrap;flex-shrink:0;z-index:10;}
        .tb-group{display:flex;align-items:center;gap:4px;padding:0 6px;border-right:1px solid rgba(255,255,255,0.08);}
        .tb-group:last-child{border-right:none;}
        .tb-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;color:#e8f5e9;}
        .tb-btn:hover{background:rgba(46,204,113,0.12);border-color:rgba(46,204,113,0.3);}
        .tb-btn.active{background:rgba(46,204,113,0.2);border-color:#2ecc71;color:#2ecc71;}
        .color-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
        .color-btn.active{border-color:#fff;transform:scale(1.2);}
        .size-slider{width:80px;accent-color:#2ecc71;cursor:pointer;}
        .tb-label{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}
        .canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fff;}
        #main-canvas{position:absolute;top:0;left:0;cursor:crosshair;touch-action:none;}
        #grid-canvas{position:absolute;top:0;left:0;pointer-events:none;}
        .statusbar{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:#111;border-top:1px solid rgba(255,255,255,0.05);font-size:10px;color:rgba(255,255,255,0.3);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
        #text-input{position:absolute;display:none;border:2px dashed #2ecc71;background:transparent;color:#222;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;min-width:100px;min-height:30px;z-index:20;padding:2px 6px;resize:both;}
        .back-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid rgba(40,100,55,0.2);background:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;text-decoration:none;transition:all 0.15s;}
        .back-btn:hover{border-color:rgba(46,204,113,0.3);color:#2ecc71;}
        @media(max-width:600px){.toolbar{gap:4px;padding:6px 8px;}.tb-btn{width:32px;height:32px;font-size:14px;}.size-slider{width:60px;}.tb-label{display:none;}}
        .instrument{position:absolute;left:0;top:0;display:none;pointer-events:auto;touch-action:none;z-index:15;transform-origin:center center;cursor:move;}
        .instrument svg{display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));}
        .rot-handle{position:absolute;width:18px;height:18px;border-radius:50%;background:#f1c40f;border:2px solid #fff;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,0.4);touch-action:none;}
        .rot-handle:active{cursor:grabbing;}
    </style>
</head>
<body>
<div class="toolbar">
    <div class="tb-group">
        <a href="eleve.html" class="back-btn">← Retour</a>
        <div class="tb-label">Tableau blanc</div>
    </div>
    <div class="tb-group">
        <div class="tb-btn active" id="tool-pen" onclick="setTool('pen')" title="Crayon">✏️</div>
        <div class="tb-btn" id="tool-marker" onclick="setTool('marker')" title="Marqueur">🖊️</div>
        <div class="tb-btn" id="tool-eraser" onclick="setTool('eraser')" title="Gomme">⬜</div>
        <div class="tb-btn" id="tool-line" onclick="setTool('line')" title="Ligne">╱</div>
        <div class="tb-btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle">▭</div>
        <div class="tb-btn" id="tool-circle" onclick="setTool('circle')" title="Cercle">○</div>
        <div class="tb-btn" id="tool-text" onclick="setTool('text')" title="Texte">T</div>
        <div class="tb-btn" id="tool-fill" onclick="setTool('fill')" title="Remplissage">🪣</div>
    </div>
    <div class="tb-group" style="gap:6px;">
        <div class="tb-label">Couleur</div>
        <div id="color-palette" style="display:flex;gap:5px;flex-wrap:wrap;max-width:180px;"></div>
        <input type="color" id="custom-color" value="#2ecc71" style="width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;padding:0;" title="Personnalisé">
    </div>
    <div class="tb-group">
        <div class="tb-label">Taille</div>
        <input type="range" class="size-slider" id="brush-size" min="1" max="30" value="3">
        <span id="size-label" style="font-size:11px;color:rgba(255,255,255,0.4);font-family:'JetBrains Mono',monospace;min-width:24px;">3</span>
    </div>
    <div class="tb-group">
        <div class="tb-btn" id="btn-grid" onclick="setBgMode('grid')" title="Carreaux">⊞</div>
        <div class="tb-btn" id="btn-lines" onclick="setBgMode('lines')" title="Lignes">☰</div>
        <div class="tb-btn" id="btn-dots" onclick="setBgMode('dots')" title="Points (millimétré)">⠿</div>
        <div class="tb-btn" id="btn-axes" onclick="setBgMode('axes')" title="Repère (axes x/y)">✚</div>
        <div class="tb-btn" id="btn-origin" onclick="armOrigin()" title="Placer l'origine du repère (puis clique sur le tableau)">⌖</div>
    </div>
    <div class="tb-group">
        <div class="tb-label">Échelle</div>
        <div class="tb-btn" onclick="changeUnit(-10)" title="Réduire l'échelle">−</div>
        <span id="unit-label" style="font-size:11px;color:rgba(255,255,255,0.4);font-family:'JetBrains Mono',monospace;min-width:42px;text-align:center;">40px</span>
        <div class="tb-btn" onclick="changeUnit(10)" title="Agrandir l'échelle">+</div>
    </div>
    <div class="tb-group">
        <div class="tb-btn" onclick="undo()" title="Annuler">↩️</div>
        <div class="tb-btn" onclick="redo()" title="Refaire">↪️</div>
        <div class="tb-btn" onclick="clearCanvas()" title="Effacer tout">🗑️</div>
        <div class="tb-btn" onclick="saveImage()" title="Télécharger">💾</div>
    </div>
    <div class="tb-group">
        <div class="tb-btn" onclick="setBg('white')" title="Fond blanc" style="background:white;border-color:#ddd;">⬜</div>
        <div class="tb-btn" onclick="setBg('#1a1a2e')" title="Fond sombre" style="background:#1a1a2e;">⬛</div>
        <div class="tb-btn" onclick="setBg('#fffde7')" title="Fond jaune" style="background:#fffde7;">🟨</div>
    </div>
    <div class="tb-group">
        <div class="tb-btn" id="btn-ruler" onclick="toggleInstrument('ruler')" title="Règle (déplaçable / pivotable)">📏</div>
        <div class="tb-btn" id="btn-protractor" onclick="toggleInstrument('protractor')" title="Rapporteur (déplaçable / pivotable)">📐</div>
    </div>
</div>
<div class="canvas-wrap" id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <canvas id="grid-canvas"></canvas>
    <div class="instrument" id="ruler"><div class="rot-handle" id="ruler-handle"></div></div>
    <div class="instrument" id="protractor"><div class="rot-handle" id="protractor-handle"></div></div>
    <textarea id="text-input" rows="1"></textarea>
</div>
<div class="statusbar">
    <span id="coords">x: 0, y: 0</span>
    <span id="tool-status">Outil : Crayon</span>
    <span>🖊️ Tableau blanc — La Classe de Stef</span>
</div>
<script>
const canvas=document.getElementById('main-canvas'),ctx=canvas.getContext('2d'),gridCanvas=document.getElementById('grid-canvas'),gridCtx=gridCanvas.getContext('2d'),wrap=document.getElementById('canvas-wrap'),textInput=document.getElementById('text-input');
let tool='pen',color='#222222',brushSize=3,isDrawing=false,startX,startY,lastX,lastY,bgMode='none',bgColor='#ffffff',undoStack=[],redoStack=[],snapshot=null;
let gridUnit=40,originX=null,originY=null,placingOrigin=false;
const COLORS=['#222222','#ffffff','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#795548','#607d8b'];
const palette=document.getElementById('color-palette');
COLORS.forEach(c=>{const btn=document.createElement('div');btn.className='color-btn'+(c===color?' active':'');btn.style.background=c;btn.style.border=c==='#ffffff'?'2px solid #ccc':'2px solid transparent';btn.onclick=()=>setColor(c);palette.appendChild(btn);});
document.getElementById('custom-color').addEventListener('input',e=>setColor(e.target.value));
document.getElementById('brush-size').addEventListener('input',e=>{brushSize=parseInt(e.target.value);document.getElementById('size-label').textContent=brushSize;});
function setColor(c){color=c;document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));const idx=COLORS.indexOf(c);if(idx>=0)palette.children[idx].classList.add('active');document.getElementById('custom-color').value=c;}
function resizeCanvas(){const w=wrap.clientWidth,h=wrap.clientHeight;const img=ctx.getImageData(0,0,canvas.width,canvas.height);canvas.width=w;canvas.height=h;gridCanvas.width=w;gridCanvas.height=h;ctx.fillStyle=bgColor;ctx.fillRect(0,0,w,h);try{ctx.putImageData(img,0,0);}catch(e){}drawGrid();}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
function setBg(c){bgColor=c;saveToUndo();ctx.fillStyle=c;ctx.fillRect(0,0,canvas.width,canvas.height);}
function drawGrid(){
    const W=gridCanvas.width,H=gridCanvas.height;
    gridCtx.clearRect(0,0,W,H);
    if(bgMode==='grid'){
        gridCtx.strokeStyle='rgba(52,152,219,0.2)';gridCtx.lineWidth=1;
        for(let x=0;x<=W;x+=gridUnit){gridCtx.beginPath();gridCtx.moveTo(x,0);gridCtx.lineTo(x,H);gridCtx.stroke();}
        for(let y=0;y<=H;y+=gridUnit){gridCtx.beginPath();gridCtx.moveTo(0,y);gridCtx.lineTo(W,y);gridCtx.stroke();}
    }else if(bgMode==='lines'){
        gridCtx.strokeStyle='rgba(52,152,219,0.25)';gridCtx.lineWidth=1;
        for(let y=32;y<H;y+=32){gridCtx.beginPath();gridCtx.moveTo(30,y);gridCtx.lineTo(W,y);gridCtx.stroke();}
        gridCtx.strokeStyle='rgba(231,76,60,0.4)';gridCtx.beginPath();gridCtx.moveTo(30,0);gridCtx.lineTo(30,H);gridCtx.stroke();
    }else if(bgMode==='dots'){
        gridCtx.fillStyle='rgba(52,152,219,0.45)';
        const ds=Math.max(10,gridUnit/2);for(let x=0;x<=W;x+=ds)for(let y=0;y<=H;y+=ds){gridCtx.beginPath();gridCtx.arc(x,y,1,0,2*Math.PI);gridCtx.fill();}
    }else if(bgMode==='axes'){
        drawAxes(W,H);
    }
}
function drawAxes(W,H){
    const u=gridUnit,ox=originX!==null?originX:Math.round(W/2),oy=originY!==null?originY:Math.round(H/2),a=6;
    gridCtx.strokeStyle='rgba(52,152,219,0.13)';gridCtx.lineWidth=1;
    for(let x=ox%u;x<=W;x+=u){gridCtx.beginPath();gridCtx.moveTo(x,0);gridCtx.lineTo(x,H);gridCtx.stroke();}
    for(let y=oy%u;y<=H;y+=u){gridCtx.beginPath();gridCtx.moveTo(0,y);gridCtx.lineTo(W,y);gridCtx.stroke();}
    gridCtx.strokeStyle='#34495e';gridCtx.fillStyle='#34495e';gridCtx.lineWidth=1.5;
    gridCtx.beginPath();gridCtx.moveTo(0,oy);gridCtx.lineTo(W,oy);gridCtx.stroke();
    gridCtx.beginPath();gridCtx.moveTo(ox,0);gridCtx.lineTo(ox,H);gridCtx.stroke();
    gridCtx.beginPath();gridCtx.moveTo(W-a*2,oy-a);gridCtx.lineTo(W,oy);gridCtx.lineTo(W-a*2,oy+a);gridCtx.closePath();gridCtx.fill();
    gridCtx.beginPath();gridCtx.moveTo(ox-a,a*2);gridCtx.lineTo(ox,0);gridCtx.lineTo(ox+a,a*2);gridCtx.closePath();gridCtx.fill();
    gridCtx.lineWidth=1;gridCtx.fillStyle='#5a6b7b';gridCtx.font="10px 'JetBrains Mono',monospace";
    gridCtx.textAlign='center';gridCtx.textBaseline='top';
    for(let x=ox+u,n=1;x<W-a*2;x+=u,n++){gridCtx.beginPath();gridCtx.moveTo(x,oy-3);gridCtx.lineTo(x,oy+3);gridCtx.stroke();gridCtx.fillText(n,x,oy+5);}
    for(let x=ox-u,n=-1;x>a*2;x-=u,n--){gridCtx.beginPath();gridCtx.moveTo(x,oy-3);gridCtx.lineTo(x,oy+3);gridCtx.stroke();gridCtx.fillText(n,x,oy+5);}
    gridCtx.textAlign='right';gridCtx.textBaseline='middle';
    for(let y=oy-u,n=1;y>a*2;y-=u,n++){gridCtx.beginPath();gridCtx.moveTo(ox-3,y);gridCtx.lineTo(ox+3,y);gridCtx.stroke();gridCtx.fillText(n,ox-6,y);}
    for(let y=oy+u,n=-1;y<H-a*2;y+=u,n--){gridCtx.beginPath();gridCtx.moveTo(ox-3,y);gridCtx.lineTo(ox+3,y);gridCtx.stroke();gridCtx.fillText(n,ox-6,y);}
    gridCtx.fillStyle='#34495e';gridCtx.font="italic 13px 'DM Sans',sans-serif";
    gridCtx.textAlign='center';gridCtx.textBaseline='middle';
    gridCtx.fillText('x',W-12,oy-12);gridCtx.fillText('y',ox+12,12);
    gridCtx.fillStyle='#5a6b7b';gridCtx.font="10px 'JetBrains Mono',monospace";
    gridCtx.textAlign='right';gridCtx.textBaseline='top';gridCtx.fillText('0',ox-5,oy+5);
}
function setBgMode(mode){
    bgMode=(bgMode===mode)?'none':mode;
    ['grid','lines','dots','axes'].forEach(m=>{const b=document.getElementById('btn-'+m);if(b)b.classList.toggle('active',bgMode===m);});
    drawGrid();
}
const TOOL_NAMES={pen:'Crayon',marker:'Marqueur',eraser:'Gomme',line:'Ligne',rect:'Rectangle',circle:'Cercle',text:'Texte',fill:'Remplissage'};
function setTool(t){if(tool==='text')commitText();tool=t;document.querySelectorAll('[id^="tool-"]').forEach(b=>b.classList.remove('active'));const el=document.getElementById('tool-'+t);if(el)el.classList.add('active');document.getElementById('tool-status').textContent='Outil : '+TOOL_NAMES[t];canvas.style.cursor=t==='eraser'?'cell':t==='text'?'text':'crosshair';}
function saveToUndo(){undoStack.push(canvas.toDataURL());if(undoStack.length>30)undoStack.shift();redoStack=[];}
function undo(){if(!undoStack.length)return;redoStack.push(canvas.toDataURL());const prev=undoStack.pop();const img=new Image();img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);};img.src=prev;}
function redo(){if(!redoStack.length)return;undoStack.push(canvas.toDataURL());const next=redoStack.pop();const img=new Image();img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);};img.src=next;}
function getPos(e){const rect=canvas.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;return{x:cx-rect.left,y:cy-rect.top};}
canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',stopDraw);
canvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e);},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();draw(e);},{passive:false});canvas.addEventListener('touchend',stopDraw);
canvas.addEventListener('mousemove',e=>{const p=getPos(e);document.getElementById('coords').textContent=`x: ${Math.round(p.x)}, y: ${Math.round(p.y)}`;});
function startDraw(e){if(placingOrigin){const q=getPos(e);originX=Math.round(q.x);originY=Math.round(q.y);placingOrigin=false;document.getElementById('btn-origin').classList.remove('active');canvas.style.cursor='crosshair';if(bgMode!=='axes'){setBgMode('axes');}else{drawGrid();}return;}if(tool==='text'){placeText(e);return;}if(tool==='fill'){floodFill(e);return;}isDrawing=true;const p=getPos(e);startX=p.x;startY=p.y;lastX=p.x;lastY=p.y;saveToUndo();if(['line','rect','circle'].includes(tool))snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);if(['pen','marker','eraser'].includes(tool)){ctx.beginPath();ctx.moveTo(lastX,lastY);}}
function draw(e){if(!isDrawing)return;const p=getPos(e);ctx.lineCap='round';ctx.lineJoin='round';if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=brushSize*3;ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}else if(tool==='pen'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=color;ctx.lineWidth=brushSize;ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}else if(tool==='marker'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=color+'80';ctx.lineWidth=brushSize*4;ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}else if(tool==='line'){ctx.putImageData(snapshot,0,0);ctx.globalCompositeOperation='source-over';ctx.strokeStyle=color;ctx.lineWidth=brushSize;ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(p.x,p.y);ctx.stroke();}else if(tool==='rect'){ctx.putImageData(snapshot,0,0);ctx.globalCompositeOperation='source-over';ctx.strokeStyle=color;ctx.lineWidth=brushSize;ctx.beginPath();ctx.strokeRect(startX,startY,p.x-startX,p.y-startY);}else if(tool==='circle'){ctx.putImageData(snapshot,0,0);ctx.globalCompositeOperation='source-over';ctx.strokeStyle=color;ctx.lineWidth=brushSize;const rx=Math.abs(p.x-startX)/2,ry=Math.abs(p.y-startY)/2,cx=startX+(p.x-startX)/2,cy=startY+(p.y-startY)/2;ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,2*Math.PI);ctx.stroke();}lastX=p.x;lastY=p.y;}
function stopDraw(){if(!isDrawing)return;isDrawing=false;ctx.globalCompositeOperation='source-over';ctx.beginPath();snapshot=null;}
function placeText(e){commitText();const p=getPos(e);textInput.style.display='block';textInput.style.left=p.x+'px';textInput.style.top=p.y+'px';textInput.style.color=color;textInput.style.fontSize=(brushSize*5+10)+'px';textInput.value='';textInput.focus();}
function commitText(){if(textInput.style.display==='none'||!textInput.value){textInput.style.display='none';return;}saveToUndo();const x=parseInt(textInput.style.left),y=parseInt(textInput.style.top);ctx.font=textInput.style.fontSize+" 'DM Sans',sans-serif";ctx.fillStyle=color;ctx.globalCompositeOperation='source-over';const lines=textInput.value.split('\n'),lh=parseInt(textInput.style.fontSize)*1.2;lines.forEach((l,i)=>ctx.fillText(l,x,y+lh*(i+1)));textInput.style.display='none';textInput.value='';}
textInput.addEventListener('keydown',e=>{if(e.key==='Escape'){textInput.style.display='none';textInput.value='';}});
function floodFill(e){saveToUndo();const p=getPos(e);const x=Math.round(p.x),y=Math.round(p.y);const id=ctx.getImageData(0,0,canvas.width,canvas.height);const d=id.data;const i=(y*canvas.width+x)*4;const tr=d[i],tg=d[i+1],tb=d[i+2],ta=d[i+3];const rgb=hexToRGB(color);if(tr===rgb[0]&&tg===rgb[1]&&tb===rgb[2])return;const stack=[[x,y]];while(stack.length){const[cx,cy]=stack.pop();if(cx<0||cy<0||cx>=canvas.width||cy>=canvas.height)continue;const j=(cy*canvas.width+cx)*4;if(d[j]!==tr||d[j+1]!==tg||d[j+2]!==tb||d[j+3]!==ta)continue;d[j]=rgb[0];d[j+1]=rgb[1];d[j+2]=rgb[2];d[j+3]=255;stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);}ctx.putImageData(id,0,0);}
function hexToRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function clearCanvas(){if(!confirm('Effacer tout ?'))return;saveToUndo();ctx.fillStyle=bgColor;ctx.fillRect(0,0,canvas.width,canvas.height);}
function saveImage(){const tmp=document.createElement('canvas');tmp.width=canvas.width;tmp.height=canvas.height;const t=tmp.getContext('2d');t.fillStyle=bgColor;t.fillRect(0,0,tmp.width,tmp.height);t.drawImage(canvas,0,0);t.drawImage(gridCanvas,0,0);const l=document.createElement('a');l.download='tableau-blanc.png';l.href=tmp.toDataURL();l.click();}
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}if(e.key==='p')setTool('pen');if(e.key==='m')setTool('marker');if(e.key==='e')setTool('eraser');if(e.key==='l')setTool('line');if(e.key==='r')setTool('rect');if(e.key==='c')setTool('circle');if(e.key==='t')setTool('text');if(e.key==='Escape')commitText();});
ctx.fillStyle=bgColor;ctx.fillRect(0,0,canvas.width,canvas.height);

// ─── ÉCHELLE DU REPÈRE ───────────────────────────────────────────────────────
function changeUnit(d){gridUnit=Math.max(20,Math.min(120,gridUnit+d));document.getElementById('unit-label').textContent=gridUnit+'px';buildRuler();drawGrid();}

// ─── PLACER L'ORIGINE ────────────────────────────────────────────────────────
function armOrigin(){placingOrigin=true;document.getElementById('btn-origin').classList.add('active');canvas.style.cursor='cell';}

// ─── INSTRUMENTS (règle + rapporteur) ────────────────────────────────────────
function buildRuler(){
    const u=gridUnit,len=u*10+40,h=50,el=document.getElementById('ruler');
    let ticks='';
    for(let i=0;i<=10;i++){const x=20+i*u;ticks+=`<line x1="${x}" y1="${i%5===0?20:28}" x2="${x}" y2="44" stroke="#2ecc71" stroke-width="${i%5===0?2:1}"/>`;ticks+=`<text x="${x}" y="15" fill="#2ecc71" font-size="10" text-anchor="middle" font-family="'JetBrains Mono',monospace">${i}</text>`;}
    const svg=`<svg width="${len}" height="${h}" viewBox="0 0 ${len} ${h}"><rect x="2" y="4" width="${len-4}" height="40" rx="5" fill="rgba(46,204,113,0.14)" stroke="#2ecc71" stroke-width="1.5"/><line x1="0" y1="45" x2="${len}" y2="45" stroke="#2ecc71" stroke-width="2.5"/>${ticks}</svg>`;
    const old=el.querySelector('svg');if(old)old.remove();
    el.insertAdjacentHTML('afterbegin',svg);
    const handle=document.getElementById('ruler-handle');handle.style.left=(len-9)+'px';handle.style.top='16px';
}
function buildProtractor(){
    const R=150,cx=R+10,cy=R+10,w=R*2+20,h=R+22,el=document.getElementById('protractor');
    let ticks='';
    for(let deg=0;deg<=180;deg+=10){const ang=Math.PI*(180-deg)/180;const x1=cx+Math.cos(ang)*R,y1=cy-Math.sin(ang)*R;const r2=R-(deg%30===0?16:9);const x2=cx+Math.cos(ang)*r2,y2=cy-Math.sin(ang)*r2;ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#3498db" stroke-width="1"/>`;if(deg%30===0){const rt=R-30,xt=cx+Math.cos(ang)*rt,yt=cy-Math.sin(ang)*rt;ticks+=`<text x="${xt.toFixed(1)}" y="${yt.toFixed(1)}" fill="#3498db" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono',monospace">${deg}</text>`;}}
    const svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy} Z" fill="rgba(52,152,219,0.12)" stroke="#3498db" stroke-width="1.5"/><line x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="#3498db" stroke-width="1.5"/><circle cx="${cx}" cy="${cy}" r="3" fill="#3498db"/>${ticks}</svg>`;
    const old=el.querySelector('svg');if(old)old.remove();
    el.insertAdjacentHTML('afterbegin',svg);
    const handle=document.getElementById('protractor-handle');handle.style.left=(cx-9)+'px';handle.style.top='1px';
}
function setupInstrument(id){
    const el=document.getElementById(id),handle=document.getElementById(id+'-handle');
    let x=80,y=80,ang=0,mode=null,sx=0,sy=0,cx=0,cy=0,startAng=0;
    function apply(){el.style.transform=`translate(${x}px,${y}px) rotate(${ang}deg)`;}
    el.addEventListener('pointerdown',e=>{if(e.target===handle)return;mode='drag';sx=e.clientX-x;sy=e.clientY-y;el.setPointerCapture(e.pointerId);e.preventDefault();});
    el.addEventListener('pointermove',e=>{if(mode==='drag'){x=e.clientX-sx;y=e.clientY-sy;apply();}});
    el.addEventListener('pointerup',e=>{mode=null;try{el.releasePointerCapture(e.pointerId);}catch(_){}});
    handle.addEventListener('pointerdown',e=>{mode='rot';const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;startAng=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI-ang;handle.setPointerCapture(e.pointerId);e.stopPropagation();e.preventDefault();});
    handle.addEventListener('pointermove',e=>{if(mode==='rot'){const an=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;ang=Math.round(an-startAng);apply();}});
    handle.addEventListener('pointerup',e=>{mode=null;try{handle.releasePointerCapture(e.pointerId);}catch(_){}});
    el._setPos=(nx,ny)=>{x=nx;y=ny;apply();};
    apply();
}
function toggleInstrument(id){
    const el=document.getElementById(id),on=el.style.display!=='block';
    el.style.display=on?'block':'none';
    document.getElementById('btn-'+id).classList.toggle('active',on);
    if(on)el._setPos(70,70);
}
buildRuler();buildProtractor();setupInstrument('ruler');setupInstrument('protractor');
</script>
