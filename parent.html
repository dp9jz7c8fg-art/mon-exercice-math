<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Partenaires – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#040804 0%,#061008 25%,#081a0e 50%,#0a2414 75%,#040804 100%);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .content{width:100%;max-width:620px;padding:20px 16px 60px;display:flex;flex-direction:column;align-items:center;gap:18px}
        .nav{width:100%;display:flex;justify-content:flex-start}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.15s}
        .nav a:hover{color:#2ecc71}
        .page-header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
        .page-icon{font-size:44px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-sub{font-size:12px;color:rgba(46,204,113,0.4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600}

        /* ── Étapes ── */
        .step{display:none;width:100%;flex-direction:column;gap:16px;align-items:center}
        .step.active{display:flex}

        /* ── Step 1 : Identification élève ── */
        .id-box{background:rgba(10,30,16,0.6);border:1px solid rgba(40,100,55,0.25);border-radius:18px;padding:28px 24px;width:100%;display:flex;flex-direction:column;gap:14px;backdrop-filter:blur(8px)}
        .id-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.6);text-align:center}
        .id-input{background:rgba(0,0,0,0.3);border:1px solid rgba(40,100,55,0.25);border-radius:10px;padding:14px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:#e8f5e9;outline:none;width:100%;transition:border-color 0.2s}
        .id-input::placeholder{color:rgba(255,255,255,0.2)}
        .id-input:focus{border-color:rgba(46,204,113,0.4)}
        .id-btn{background:#2ecc71;color:#040804;border:none;border-radius:10px;padding:14px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:opacity 0.15s}
        .id-btn:hover{opacity:0.85}
        #id-error{font-size:12px;color:#e74c3c;text-align:center;min-height:16px}

        /* ── Step 2 : Qui êtes-vous ? ── */
        .role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%}
        .role-btn{background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:14px;padding:16px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;font-size:14px;color:#e8f5e9;font-weight:500}
        .role-btn:hover{border-color:rgba(46,204,113,0.4);background:rgba(20,50,28,0.5)}
        .role-btn.selected{border-color:#2ecc71;background:rgba(46,204,113,0.12)}
        .role-icon{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(46,204,113,0.08);flex-shrink:0}
        .role-btn.selected .role-icon{background:rgba(46,204,113,0.2)}

        /* ── Step 3 : Dashboard partenaire ── */
        .partner-header{width:100%;display:flex;align-items:center;justify-content:space-between;background:rgba(10,30,16,0.5);border:1px solid rgba(40,100,55,0.2);border-radius:14px;padding:12px 16px}
        .ph-left{display:flex;flex-direction:column;gap:2px}
        .ph-child{font-size:15px;font-weight:700}
        .ph-role{font-size:11px;color:rgba(46,204,113,0.6);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
        .ph-btn{background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);border-radius:8px;padding:6px 12px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;color:#2ecc71;cursor:pointer;transition:all 0.15s}
        .ph-btn:hover{background:rgba(46,204,113,0.15)}

        /* Stats */
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
        .stat-box{background:rgba(10,30,16,0.5);border:1px solid rgba(40,100,55,0.2);border-radius:12px;padding:16px;text-align:center}
        .stat-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:#2ecc71}
        .stat-label{font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;font-weight:600}

        /* Sections */
        .section{width:100%;background:rgba(10,30,16,0.5);border:1px solid rgba(40,100,55,0.2);border-radius:14px;padding:18px 16px;display:flex;flex-direction:column;gap:12px}
        .section-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}

        /* Barres de progression */
        .prog-row{display:flex;align-items:center;gap:8px}
        .prog-name{width:90px;font-size:11px;color:rgba(255,255,255,0.4);text-align:right;flex-shrink:0}
        .prog-bar-bg{flex:1;height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden}
        .prog-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2ecc71,#27ae60)}
        .prog-score{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);width:50px}

        /* Notes/Remarques */
        .notes-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
        .note-card{background:rgba(0,0,0,0.2);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
        .note-top{display:flex;justify-content:space-between;align-items:center}
        .note-author{font-size:12px;font-weight:600;color:#e8f5e9}
        .note-role{font-size:9px;color:rgba(46,204,113,0.5);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
        .note-date{font-size:9px;color:rgba(255,255,255,0.2)}
        .note-text{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5}
        .no-notes{font-size:12px;color:rgba(255,255,255,0.2);text-align:center;padding:8px}

        /* Formulaire note */
        .note-form{display:flex;flex-direction:column;gap:10px;margin-top:6px;padding-top:10px;border-top:1px solid rgba(40,100,55,0.15)}
        .note-textarea{background:rgba(0,0,0,0.3);border:1px solid rgba(40,100,55,0.25);border-radius:8px;padding:12px;font-size:13px;font-family:'DM Sans',sans-serif;color:#e8f5e9;outline:none;resize:vertical;min-height:60px;width:100%}
        .note-textarea::placeholder{color:rgba(255,255,255,0.2)}
        .note-textarea:focus{border-color:rgba(46,204,113,0.4)}
        .note-submit{background:#2ecc71;color:#040804;border:none;border-radius:8px;padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;align-self:flex-end;padding-left:20px;padding-right:20px}
        .note-submit:hover{opacity:0.85}
        .note-submit:disabled{opacity:0.4}
        #note-fb{font-size:11px;text-align:center;min-height:14px}
        .af-ok{color:#2ecc71}.af-err{color:#e74c3c}

        /* Avis */
        .avis-section{width:100%}
        .stars-input{display:flex;gap:6px}
        .star-btn{font-size:28px;cursor:pointer;color:rgba(255,255,255,0.15);transition:color 0.15s,transform 0.1s;background:none;border:none;padding:0}
        .star-btn.active{color:#f39c12}
        .star-btn:hover{transform:scale(1.2)}
        #avis-fb{font-size:11px;text-align:center;min-height:14px}

        @media(max-width:520px){.role-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr 1fr}.page-title{font-size:22px}}
    </style>
</head>
<body>

<div class="content">
    <div class="nav"><a href="index.html">← Accueil</a></div>

    <div class="page-header">
        <span class="page-icon">🤝</span>
        <h1 class="page-title">Espace Partenaires</h1>
        <p class="page-sub">Suivi collaboratif de l'élève</p>
    </div>

    <!-- STEP 1 : Identification -->
    <div class="step active" id="step-1">
        <div class="id-box">
            <div class="id-title">Entrez le nom et le prénom de l'élève</div>
            <input type="text" class="id-input" id="child-lastname" placeholder="Nom de famille" autocomplete="off">
            <input type="text" class="id-input" id="child-firstname" placeholder="Prénom" autocomplete="off">
            <button class="id-btn" onclick="findChild()">Continuer</button>
            <div id="id-error"></div>
        </div>
    </div>

    <!-- STEP 2 : Qui êtes-vous ? -->
    <div class="step" id="step-2">
        <div class="id-box">
            <div class="id-title">Vous êtes…</div>
            <div class="role-grid" id="role-grid"></div>
            <button class="id-btn" onclick="confirmRole()">Accéder au suivi</button>
            <div id="role-error" style="font-size:12px;color:#e74c3c;text-align:center;min-height:16px"></div>
        </div>
    </div>

    <!-- STEP 3 : Dashboard -->
    <div class="step" id="step-3">
        <div class="partner-header">
            <div class="ph-left">
                <div class="ph-child" id="display-child"></div>
                <div class="ph-role" id="display-role"></div>
            </div>
            <button class="ph-btn" onclick="resetPartner()">Changer d'élève</button>
        </div>

        <!-- Stats globales -->
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val" id="s-exercises">0</div><div class="stat-label">Exercices</div></div>
            <div class="stat-box"><div class="stat-val" id="s-correct">0</div><div class="stat-label">Corrects</div></div>
            <div class="stat-box"><div class="stat-val" id="s-pct">0%</div><div class="stat-label">Réussite</div></div>
        </div>

        <!-- Progression -->
        <div class="section">
            <div class="section-title">📊 Progression par objectif</div>
            <div id="progression-bars"></div>
        </div>

        <!-- Cours & ateliers -->
        <div class="section">
            <div class="section-title">📅 Cours & Ateliers</div>
            <div class="stats-row" style="margin-top:4px">
                <div class="stat-box"><div class="stat-val" id="s-cours">0</div><div class="stat-label">Cours réservés</div></div>
                <div class="stat-box"><div class="stat-val" id="s-badges">0</div><div class="stat-label">Badges</div></div>
                <div class="stat-box"><div class="stat-val" id="s-ateliers">—</div><div class="stat-label">Ateliers</div></div>
            </div>
        </div>

        <!-- Notes partagées -->
        <div class="section">
            <div class="section-title">📝 Notes & Remarques</div>
            <div class="notes-list" id="notes-list"></div>
            <div class="note-form">
                <textarea class="note-textarea" id="note-text" placeholder="Ajouter une note sur l'élève…"></textarea>
                <div style="display:flex;align-items:center;justify-content:space-between">
                    <div id="note-fb"></div>
                    <button class="note-submit" id="btn-note" onclick="submitNote()">Envoyer</button>
                </div>
            </div>
        </div>

        <!-- Laisser un avis -->
        <div class="section avis-section">
            <div class="section-title">⭐ Laisser un avis</div>
            <div style="display:flex;flex-direction:column;gap:10px">
                <div class="stars-input" id="stars-input"></div>
                <textarea class="note-textarea" id="avis-text" placeholder="Votre avis sur La Classe de Stef…"></textarea>
                <div style="display:flex;align-items:center;justify-content:space-between">
                    <div id="avis-fb"></div>
                    <button class="note-submit" onclick="submitAvis()">Envoyer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyB0djV_ZDOsYngnUeceNiTUt60IEKP_Qvg",authDomain:"classe-de-stef.firebaseapp.com",projectId:"classe-de-stef",storageBucket:"classe-de-stef.firebasestorage.app",messagingSenderId:"16372668790",appId:"1:16372668790:web:b1bfed825bfb36111b0257"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const ROLES = [
    {id:'papa',label:'Papa',icon:'👨'},
    {id:'maman',label:'Maman',icon:'👩'},
    {id:'logopede',label:'Logopède',icon:'🗣️'},
    {id:'neuropsy',label:'Neuropsychologue',icon:'🧠'},
    {id:'coach',label:'Coach scolaire',icon:'🎯'},
    {id:'prof',label:'Professeur',icon:'👩‍🏫'},
    {id:'educateur',label:'Éducateur',icon:'🤝'},
    {id:'autre',label:'Autre',icon:'👤'},
];

let childProfile = null;
let childId = null;
let selectedRole = null;
let selectedStars = 5;

// Enter keys
document.getElementById('child-firstname').addEventListener('keydown',e=>{if(e.key==='Enter')findChild()});

// Build role grid
const roleGrid = document.getElementById('role-grid');
ROLES.forEach(r => {
    const btn = document.createElement('div');
    btn.className = 'role-btn';
    btn.innerHTML = `<div class="role-icon">${r.icon}</div><span>${r.label}</span>`;
    btn.onclick = () => {
        roleGrid.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRole = r;
    };
    roleGrid.appendChild(btn);
});

// Stars
const starsEl = document.getElementById('stars-input');
for(let i=1;i<=5;i++){
    const btn=document.createElement('button');btn.className='star-btn active';btn.textContent='★';btn.dataset.val=i;
    btn.onclick=()=>{selectedStars=i;starsEl.querySelectorAll('.star-btn').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.val)<=i)})};
    starsEl.appendChild(btn);
}

function showStep(n){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step-'+n).classList.add('active');
}

// STEP 1: Find child
async function findChild(){
    const ln=document.getElementById('child-lastname').value.trim().toLowerCase();
    const fn=document.getElementById('child-firstname').value.trim().toLowerCase();
    const err=document.getElementById('id-error');
    err.textContent='';
    if(!ln||!fn){err.textContent='Veuillez remplir les deux champs.';return}

    try{
        const snap=await db.collection('users').get();
        let found=null;let fId=null;
        snap.forEach(doc=>{
            const d=doc.data();
            if((d.name||'').toLowerCase()===fn && (d.lastname||'').toLowerCase()===ln){found=d;fId=doc.id}
        });
        if(!found){err.textContent='Aucun élève trouvé. Vérifiez l\'orthographe.';return}
        childProfile=found;childId=fId;
        showStep(2);
    }catch(e){err.textContent='Erreur de connexion.'}
}

// STEP 2: Confirm role
function confirmRole(){
    const err=document.getElementById('role-error');
    err.textContent='';
    if(!selectedRole){err.textContent='Veuillez sélectionner votre rôle.';return}
    showStep(3);
    renderDashboard();
}

function resetPartner(){
    childProfile=null;childId=null;selectedRole=null;
    roleGrid.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById('child-lastname').value='';
    document.getElementById('child-firstname').value='';
    showStep(1);
}

// STEP 3: Dashboard
async function renderDashboard(){
    const p=childProfile;
    const fullName=(p.name||'')+' '+(p.lastname||'');
    document.getElementById('display-child').textContent=fullName;
    document.getElementById('display-role').textContent=selectedRole.icon+' '+selectedRole.label;

    const totalEx=p.totalExercises||0;
    const totalCo=p.totalCorrect||0;
    const pct=totalEx>0?Math.round(totalCo/totalEx*100):0;

    document.getElementById('s-exercises').textContent=totalEx;
    document.getElementById('s-correct').textContent=totalCo;
    document.getElementById('s-pct').textContent=pct+'%';
    document.getElementById('s-badges').textContent=(p.badges||[]).length;

    // Count bookings
    try{
        const bSnap=await db.collection('bookings').where('userId','==',childId).get();
        document.getElementById('s-cours').textContent=bSnap.size;
    }catch(e){document.getElementById('s-cours').textContent='—'}

    // Progression bars
    let barsHTML='';

    // Angles
    const ang=p.scores?.angles||{done:0,correct:0};
    barsHTML+=barRow('📐 Angles',ang.done,ang.correct);

    // Fractions
    const fracKeys=['comparer','convertir','arrondir','simplifier','add-sub','multiplier','diviser'];
    const fracLabels={comparer:'Comparer',convertir:'Convertir',arrondir:'Arrondir',simplifier:'Simplifier','add-sub':'Add/Soustr',multiplier:'Multiplier',diviser:'Diviser'};
    fracKeys.forEach(k=>{const s=p.scores?.fractions?.[k]||{done:0,correct:0};barsHTML+=barRow('½ '+fracLabels[k],s.done,s.correct)});

    // Algèbre
    const algKeys=['comprendre','evaluer','simplifier','parentheses','developper','factoriser','identites','polynomes','problemes'];
    const algLabels={comprendre:'Comprendre',evaluer:'Évaluer',simplifier:'Simplifier',parentheses:'Parenthèses',developper:'Développer',factoriser:'Factoriser',identites:'Identités',polynomes:'Polynômes',problemes:'Problèmes'};
    algKeys.forEach(k=>{const s=p.scores?.algebre?.[k]||{done:0,correct:0};barsHTML+=barRow('𝑥 '+algLabels[k],s.done,s.correct)});

    document.getElementById('progression-bars').innerHTML=barsHTML;

    // Load notes
    loadNotes();
}

function barRow(name,done,correct){
    const pct=done>0?Math.round(correct/done*100):0;
    return `<div class="prog-row"><span class="prog-name">${name}</span><div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div><span class="prog-score">${correct}/${done}</span></div>`;
}

// Notes
async function loadNotes(){
    const list=document.getElementById('notes-list');
    try{
        const snap=await db.collection('notes').where('childId','==',childId).orderBy('createdAt','desc').limit(30).get();
        if(snap.empty){list.innerHTML='<div class="no-notes">Aucune note pour le moment.</div>';return}
        let html='';
        snap.forEach(doc=>{
            const n=doc.data();
            const date=n.createdAt?n.createdAt.toDate().toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
            html+=`<div class="note-card"><div class="note-top"><div><span class="note-author">${n.authorName||'Anonyme'}</span> <span class="note-role">${n.authorRole||''}</span></div><span class="note-date">${date}</span></div><div class="note-text">${n.text}</div></div>`;
        });
        list.innerHTML=html;
    }catch(e){list.innerHTML='<div class="no-notes">Erreur de chargement.</div>'}
}

async function submitNote(){
    const text=document.getElementById('note-text').value.trim();
    const fb=document.getElementById('note-fb');
    const btn=document.getElementById('btn-note');
    fb.textContent='';
    if(!text){fb.textContent='Écrivez une note.';fb.className='af-err';return}
    btn.disabled=true;btn.textContent='…';
    try{
        await db.collection('notes').add({
            childId:childId,
            childName:(childProfile.name||'')+' '+(childProfile.lastname||''),
            authorName:selectedRole.label,
            authorRole:selectedRole.id,
            authorIcon:selectedRole.icon,
            text:text,
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        fb.textContent='✓ Note ajoutée !';fb.className='af-ok';
        document.getElementById('note-text').value='';
        loadNotes();
    }catch(e){fb.textContent='Erreur.';fb.className='af-err'}
    btn.disabled=false;btn.textContent='Envoyer';
}

// Avis
async function submitAvis(){
    const text=document.getElementById('avis-text').value.trim();
    const fb=document.getElementById('avis-fb');
    fb.textContent='';
    if(!text||text.length<10){fb.textContent='Votre avis doit contenir au moins 10 caractères.';fb.className='af-err';return}
    try{
        await db.collection('avis').add({
            author:selectedRole.label+' de '+(childProfile.name||''),
            text:text,stars:selectedStars,type:'partenaire',role:selectedRole.id,
            createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        fb.textContent='✓ Merci !';fb.className='af-ok';
        document.getElementById('avis-text').value='';
    }catch(e){fb.textContent='Erreur.';fb.className='af-err'}
}
</script>
</body>
</html>
