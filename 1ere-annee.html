<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1ère année – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:auto;min-height:100%}
        body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#040804,#061008,#081a0e,#040804);background-size:400% 400%;animation:grad 20s ease infinite;color:#e8f5e9;display:flex;flex-direction:column;align-items:center;justify-content:center}
        @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .page{width:100%;max-width:500px;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:24px}
        .nav{width:100%;display:flex;justify-content:flex-start}
        .nav a{color:rgba(46,204,113,0.5);text-decoration:none;font-size:13px;font-weight:600;transition:color 0.15s}
        .nav a:hover{color:#2ecc71}
        .page-header{text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
        .page-icon{font-size:44px}
        .page-title{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;font-weight:700;background:linear-gradient(135deg,#2ecc71,#a8f0c0,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .card{width:100%;background:rgba(10,30,16,0.55);border:1px solid rgba(40,100,55,0.25);border-radius:20px;padding:28px 20px;text-decoration:none;color:#e8f5e9;display:flex;align-items:center;gap:16px;transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s;backdrop-filter:blur(8px)}
        .card:hover{transform:translateY(-3px);background:rgba(20,50,28,0.7);border-color:rgba(46,204,113,0.4);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
        .card-icon{font-size:32px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(46,204,113,0.1);flex-shrink:0}
        .card-body{display:flex;flex-direction:column;gap:4px}
        .card-title{font-size:16px;font-weight:700}
        .card-desc{font-size:11px;color:rgba(255,255,255,0.4)}
        .badge{display:inline-flex;align-self:flex-start;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:rgba(46,204,113,0.15);color:#2ecc71}
    
        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid { grid-template-columns: 1fr !important; }
            .grid-2 { gap: 12px !important; }
            .space-card { padding: 22px 16px !important; }
            .space-icon { width: 60px !important; height: 60px !important; font-size: 36px !important; }
            .space-title { font-size: 17px !important; }
            .space-desc { font-size: 11px !important; }
            .card { padding: 18px 14px !important; gap: 10px !important; }
            .card-icon { width: 50px !important; height: 50px !important; font-size: 28px !important; }
            .card-title { font-size: 14px !important; }
            .card-desc { font-size: 11px !important; }
            .p-card { padding: 18px 12px !important; }
            .p-card-icon { width: 48px !important; height: 48px !important; font-size: 28px !important; }
            .eleve-profile { padding: 10px 14px !important; gap: 10px !important; }
            .ep-avatar { width: 44px !important; height: 44px !important; font-size: 28px !important; }
            .ep-name { font-size: 14px !important; }
            .section { padding: 16px 14px !important; }
            .section-title { font-size: 13px !important; }
            .welcome-title, .page-title { font-size: 20px !important; }
            .logo-wrap { padding: 10px 24px !important; }
            .logo-wrap img { max-height: 48px !important; }
            #breadcrumb { font-size: 10px !important; padding: 6px 12px !important; }
            body { padding-top: 32px !important; }
            .stats-row { gap: 6px !important; }
            .stat-box { padding: 10px 8px !important; }
            .stat-val { font-size: 20px !important; }
            .stat-label { font-size: 8px !important; }
            .btn-save, .btn-submit, .id-btn, .add-btn { padding: 14px !important; font-size: 14px !important; }
            .avis-wrap { height: 44px !important; }
            .avis-text { font-size: 11px !important; }
            .social-row { gap: 12px !important; }
            .social-link { width: 40px !important; height: 40px !important; }
            .footer { font-size: 8px !important; }
            .stef-inline { width: 32px !important; height: 32px !important; font-size: 18px !important; }
            .agenda-btn { width: 40px !important; height: 40px !important; font-size: 18px !important; }
            .tab { padding: 6px 10px !important; font-size: 10px !important; }
            .ans-input { width: 100% !important; font-size: 16px !important; }
            .expr-display { font-size: 16px !important; padding: 12px !important; }
            .qcm-grid { grid-template-columns: 1fr !important; }
            .qcm-btn { padding: 12px !important; font-size: 14px !important; }
            .profile-card { padding: 20px 16px !important; }
            .avatar-big { width: 80px !important; height: 80px !important; font-size: 48px !important; }
            .profile-name { font-size: 20px !important; }
            .mindmap-svg { height: auto !important; }
            .content { padding-left: 12px !important; padding-right: 12px !important; }
            .id-box { padding: 20px 16px !important; }
            .role-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
            .role-btn { padding: 12px 10px !important; font-size: 13px !important; }
            .role-icon { width: 34px !important; height: 34px !important; font-size: 20px !important; }
            .add-row { flex-direction: column !important; }
            .add-btn { width: 100% !important; }
            .obj-card { padding: 10px 12px !important; }
            .section-dashed { padding: 16px 14px !important; }
        }
        
</style>
</head>
<body>
<div class="page">
    <div class="page-header">
        <span class="page-icon">1️⃣</span>
        <h1 class="page-title">1ère année</h1>
    </div>
    <a href="exercices.html" class="card">
        <div class="card-icon">📐</div>
        <div class="card-body">
            <div class="card-title">Mesure d'angles</div>
            <div class="card-desc">Utilise l'équerre Aristo pour mesurer des angles.</div>
            <span class="badge">Disponible</span>
        </div>
    </a>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script src="theme.js"></script>
<script src="breadcrumb.js"></script>
<script>requireAuth((u,p)=>{});</script>
<script src="social-bar.js"></script>
</body>
</html>
