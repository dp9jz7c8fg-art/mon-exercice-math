<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exercice Angles - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-logo">
        <img src="logo.png" alt="Logo" class="site-logo">
    </div>

    <div id="main-content">
        <header>
            <div id="score-board">
                Score : <span id="current-score">0</span> / <span id="total-questions">0</span>
            </div>

            <div id="rotation-control">
                <div id="rotation-wheel"></div>
                <span id="angle-display">0°</span>
                <span>Pivoter</span>
            </div>
        </header>

        <div id="toolbar">
            <button class="zoom-btn" onclick="ajusterZoom(0.2)">🔍 +</button>
            <button class="zoom-btn" onclick="ajusterZoom(-0.2)">🔍 −</button>
            <button class="zoom-btn" onclick="resetZoom()">🔄</button>
            <span class="hint-pc">Dbl-clic → Plein écran</span>

            <div id="size-control">
                <span>📐</span>
                <input type="range" id="equerre-size" min="80" max="320" value="180">
            </div>
        </div>

        <div id="exercice-container">
            <img src="IMG_0906.jpg" alt="Fiche" id="fond-exercice">
            <div id="cursor-wrapper">
                <img src="equerre.png" alt="Équerre" id="custom-cursor">
            </div>
        </div>

        <div class="reponses-eleve">
            <div class="input-group">
                <input type="number" id="user-answer" placeholder="Entrez les degrés…">
                <button id="btn-valider" onclick="verifierReponse()">Valider</button>
            </div>
            <p id="feedback"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
