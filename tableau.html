<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau Mathématique – La Classe de Stef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{font-family:'DM Sans',sans-serif;background:#0a0a0a;display:flex;flex-direction:column;}

        /* Toolbar */
        .toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#111;border-bottom:1px solid rgba(46,204,113,0.2);flex-shrink:0;flex-wrap:wrap;}
        .tb-title{font-size:14px;font-weight:700;color:#2ecc71;flex:1;}
        .tb-subtitle{font-size:10px;color:rgba(255,255,255,0.3);}

        /* Mode buttons */
        .mode-grid{display:flex;gap:6px;flex-wrap:wrap;}
        .mode-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:10px;border:1px solid rgba(40,100,55,0.25);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.15s;color:rgba(255,255,255,0.5);font-size:10px;font-weight:600;white-space:nowrap;font-family:'DM Sans',sans-serif;}
        .mode-btn:hover{border-color:rgba(46,204,113,0.4);color:#e8f5e9;background:rgba(46,204,113,0.08);}
        .mode-btn.active{border-color:#2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71;}
        .mode-icon{font-size:18px;}

        /* Back button */
        .back-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid rgba(40,100,55,0.2);background:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;text-decoration:none;transition:all 0.15s;}
        .back-btn:hover{border-color:rgba(46,204,113,0.3);color:#2ecc71;}

        /* Main area */
        .main-area{flex:1;position:relative;overflow:hidden;}
        iframe{width:100%;height:100%;border:none;display:block;}

        /* Info bar */
        .infobar{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:#111;border-top:1px solid rgba(255,255,255,0.04);font-size:10px;color:rgba(255,255,255,0.25);flex-shrink:0;}
        .infobar a{color:rgba(46,204,113,0.4);text-decoration:none;}
        .infobar a:hover{color:#2ecc71;}

        @media(max-width:600px){
            .mode-btn{padding:5px 7px;font-size:9px;}
            .mode-icon{font-size:16px;}
            .tb-title{font-size:12px;}
        }
    </style>
</head>
<body>

<div class="toolbar">
    <a href="eleve.html" class="back-btn">← Retour</a>
    <div>
        <div class="tb-title">📐 Tableau Mathématique</div>
        <div class="tb-subtitle">Propulsé par GeoGebra</div>
    </div>
    <div class="mode-grid">
        <button class="mode-btn active" onclick="setMode('classic')" id="btn-classic">
            <span class="mode-icon">📐</span>Géométrie
        </button>
        <button class="mode-btn" onclick="setMode('graphing')" id="btn-graphing">
            <span class="mode-icon">📈</span>Fonctions
        </button>
        <button class="mode-btn" onclick="setMode('cas')" id="btn-cas">
            <span class="mode-icon">🔢</span>Calcul CAS
        </button>
        <button class="mode-btn" onclick="setMode('3d')" id="btn-3d">
            <span class="mode-icon">🧊</span>3D
        </button>
        <button class="mode-btn" onclick="setMode('calc')" id="btn-calc">
            <span class="mode-icon">🧮</span>Calculatrice
        </button>
        <button class="mode-btn" onclick="setMode('stats')" id="btn-stats">
            <span class="mode-icon">📊</span>Stats
        </button>
    </div>
</div>

<div class="main-area">
    <iframe id="geo-frame" src="https://www.geogebra.org/classic?lang=fr" allowfullscreen></iframe>
</div>

<div class="infobar">
    <span>La Classe de Stef — Tableau interactif</span>
    <a href="https://www.geogebra.org" target="_blank">Powered by GeoGebra (gratuit & open source)</a>
</div>

<script>
const MODES = {
    'classic':  'https://www.geogebra.org/classic?lang=fr',
    'graphing': 'https://www.geogebra.org/graphing?lang=fr',
    'cas':      'https://www.geogebra.org/cas?lang=fr',
    '3d':       'https://www.geogebra.org/3d?lang=fr',
    'calc':     'https://www.geogebra.org/scientific?lang=fr',
    'stats':    'https://www.geogebra.org/probability?lang=fr',
};

let currentMode = 'classic';

function setMode(mode) {
    if (currentMode === mode) return;
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');
    document.getElementById('geo-frame').src = MODES[mode];
}
</script>
</body>
</html>
